/* ============ apri su Google Maps ============ */
/* Maps URLs (api=1, nessuna chiave): origin + destination + waypoints in ordine.
   Il pipe va codificato %7C, la virgola %2C. Limite pratico ~9 waypoint per link,
   quindi i giorni lunghi vengono spezzati in tratte consecutive. */
const MAXW = 9; // waypoint intermedi per link

function gmapsLinks(list, mode){
  const c = p => p.lat.toFixed(6)+'%2C'+p.lng.toFixed(6);
  const out = [];
  for(let s = 0; s < list.length - 1; s += MAXW + 1){
    const chunk = list.slice(s, s + MAXW + 2);
    if(chunk.length < 2) break;
    const mid = chunk.slice(1, -1);
    let u = 'https://www.google.com/maps/dir/?api=1'
          + '&origin=' + c(chunk[0])
          + '&destination=' + c(chunk[chunk.length-1])
          + '&travelmode=' + mode;
    if(mid.length) u += '&waypoints=' + mid.map(c).join('%7C');
    out.push({url:u, from:chunk[0].name, to:chunk[chunk.length-1].name, n:chunk.length});
  }
  return out;
}

function openInGmaps(d, list){
  if(list.length < 2){
    if(list.length === 1) window.open('https://www.google.com/maps/search/?api=1&query='+list[0].lat.toFixed(6)+'%2C'+list[0].lng.toFixed(6), '_blank');
    return;
  }
  /* spezzo il giorno dove cambia il modo: i blocchi cittadini escono come percorsi a piedi.
     I blocchi condividono il punto di giunzione, così la catena resta continua. */
  const blocks = [];
  let cur = {mode: legMode(list[0], list[1]), pts: [list[0]]};
  for(let i=1;i<list.length;i++){
    const m = legMode(list[i-1], list[i]);
    if(m !== cur.mode){ blocks.push(cur); cur = {mode:m, pts:[list[i-1]]}; }
    cur.pts.push(list[i]);
  }
  blocks.push(cur);

  const links = [];
  blocks.forEach(b => { if(b.pts.length > 1) links.push(...gmapsLinks(b.pts, b.mode).map(l => ({...l, mode:b.mode}))); });

  if(links.length === 1){ window.open(links[0].url, '_blank'); return; }

  const box = document.getElementById('gmapsList');
  box.innerHTML =
    '<p class="empty" style="padding:0 0 10px">Il giorno si divide in '+links.length+' tratte '+
    '(cambio di mezzo o troppe tappe per un solo link). Aprile in sequenza:</p>' +
    links.map((l,i) =>
      '<a class="btn" style="display:block;margin-bottom:6px;text-decoration:none" target="_blank" rel="noopener" href="'+l.url+'">'+
      (l.mode==='walking'?'🚶 ':'🚗 ')+'Tratta '+(i+1)+' · '+esc(l.from)+' → '+esc(l.to)+'</a>').join('');
  document.getElementById('gmapsTitle').textContent = d.name + ' su Google Maps';
  document.getElementById('gmapsVeil').hidden = false;
}

/* ============ spese condivise ============ */
function normalize(){
  if(!state.id) state.id = uid();
  if(!state.people) state.people = [];
  if(!state.expenses) state.expenses = [];
  if(!state.bookings) state.bookings = [];
  if(!state.currency) state.currency = '€';
  /* le versioni precedenti avevano "Con Francesco" come tipo: ora è un contrassegno */
  state.places.forEach(p => {
    if(p.type === 'kids'){ p.type = 'place'; p.kid = true; }
  });
}
const money = v => state.currency + ' ' + (Math.round(v*100)/100).toFixed(2).replace('.', ',');
const personName = id => (state.people.find(p=>p.id===id) || {name:'—'}).name;

function balances(){
  const b = {};
  state.people.forEach(p => b[p.id] = 0);
  state.expenses.forEach(e => {
    const forIds = e.forIds.filter(id => b[id] !== undefined);
    if(!forIds.length) return;
    const share = e.amount / forIds.length;
    if(b[e.byId] !== undefined) b[e.byId] += e.amount;
    forIds.forEach(id => b[id] -= share);
  });
  return b;
}

/* trasferimenti minimi: il maggior debitore salda il maggior creditore */
function settle(){
  const b = balances(), cred = [], deb = [];
  Object.entries(b).forEach(([id,v]) => {
    const r = Math.round(v*100)/100;
    if(r > 0.005) cred.push({id, v:r});
    else if(r < -0.005) deb.push({id, v:-r});
  });
  cred.sort((x,y)=>y.v-x.v); deb.sort((x,y)=>y.v-x.v);
  const out = []; let i=0, j=0;
  while(i < deb.length && j < cred.length){
    const amt = Math.min(deb[i].v, cred[j].v);
    out.push({from:deb[i].id, to:cred[j].id, amt:Math.round(amt*100)/100});
    deb[i].v -= amt; cred[j].v -= amt;
    if(deb[i].v < 0.005) i++;
    if(cred[j].v < 0.005) j++;
  }
  return out;
}

function drawCosts(){
  normalize();
  const box = document.getElementById('costs');
  const tot = state.expenses.reduce((s,e)=>s+e.amount, 0);
  const b = balances();

  let h = '<div class="cost-sec"><div class="alt-head mono">Partecipanti · '+state.people.length+'</div>';
  if(!state.people.length){
    h += '<p class="empty" style="padding:0">Aggiungi chi partecipa al viaggio: le spese si dividono tra loro.</p>';
  } else {
    h += '<div class="who-list">' + state.people.map(p => {
      const v = b[p.id] || 0;

             '<span class="who-b '+cls+'"><i>'+lab+'</i>'+money(Math.abs(v))+'</span>'+
             '<button class="icon-btn" data-del="'+p.id+'" title="Rimuovi">✕</button></div>';
    }).join('') + '</div>';
  }
  h += '<div class="add-row"><input class="field" id="newPerson" placeholder="Nome partecipante" autocomplete="off">'+
       '<button class="chip" id="addPerson">Aggiungi</button></div></div>';

  h += '<div class="cost-sec"><div class="alt-head mono">Spese · '+state.expenses.length+' · totale '+money(tot)+'</div>';
  if(!state.expenses.length){
    h += '<p class="empty" style="padding:0">Nessuna spesa registrata.</p>';
  } else {
    h += state.expenses.slice().reverse().map(e => {
      const who = e.forIds.length === state.people.length && state.people.length
        ? 'tutti' : e.forIds.map(personName).join(', ');
      return '<div class="exp"><div class="exp-top">'+
        '<span class="exp-d">'+esc(e.desc||'Spesa')+'</span>'+
        '<span class="exp-a mono">'+money(e.amount)+'</span>'+
        '<button class="icon-btn" data-delx="'+e.id+'" title="Elimina">✕</button></div>'+
        '<div class="exp-m mono">'+esc(personName(e.byId))+' ha pagato · per '+esc(who)+'</div></div>';
    }).join('');
  }
  h += '</div>';

  const tr = settle();
  h += '<div class="cost-sec"><div class="alt-head mono">Come pareggiare · '+tr.length+' movimenti</div>';
  h += tr.length
    ? tr.map(t => '<div class="settle"><b>'+esc(personName(t.from))+'</b> → <b>'+esc(personName(t.to))+'</b>'+
        '<span class="mono">'+money(t.amt)+'</span></div>').join('')
    : '<p class="empty" style="padding:0">Tutti in pari.</p>';
  h += '</div>';

  box.innerHTML = h;

  const np = document.getElementById('newPerson');
  const addP = () => {
    const v = np.value.trim();
    if(!v) return;
    state.people.push({id:uid(), name:v});
    save(); drawCosts();
    document.getElementById('newPerson').focus();
  };
  document.getElementById('addPerson').onclick = addP;
  np.onkeydown = e => { if(e.key === 'Enter') addP(); };
  box.querySelectorAll('[data-del]').forEach(b2 => b2.onclick = () => {
    const id = b2.dataset.del;
    if(state.expenses.some(e => e.byId === id || e.forIds.includes(id))
       && !confirm(personName(id)+' compare in alcune spese. Rimuovere comunque?')) return;
    state.people = state.people.filter(p => p.id !== id);
    state.expenses = state.expenses.filter(e => e.byId !== id);
    state.expenses.forEach(e => e.forIds = e.forIds.filter(x => x !== id));
    state.expenses = state.expenses.filter(e => e.forIds.length);
    save(); drawCosts();
  });
  box.querySelectorAll('[data-delx]').forEach(b2 => b2.onclick = () => {
    state.expenses = state.expenses.filter(e => e.id !== b2.dataset.delx);
    save(); drawCosts();
  });
}

/* ============ immagine della tappa ============ */
/* Una foto da telefono pesa 3-5 MB: salvata così farebbe esplodere il file del viaggio
   e supererebbe il limite dello storage. La ridimensiono a 900 px lato lungo e la
   ricomprimo in JPEG prima di conservarla. */
function shrinkImage(file, cb, maxPx){
  const rd = new FileReader();
  rd.onload = () => {
    const img = new Image();
    img.onload = () => {
      const max = maxPx || 900;
      let {width:w, height:h} = img;
      if(w > max || h > max){ const s = max/Math.max(w,h); w = Math.round(w*s); h = Math.round(h*s); }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(c.toDataURL('image/jpeg', 0.72));
    };
    img.onerror = () => cb(null);
    img.src = rd.result;
  };
  rd.onerror = () => cb(null);
  rd.readAsDataURL(file);
}

/* Sei tipi con esigenze diverse: un treno ha partenza e arrivo con orario,
   un albergo ha check-in e check-out, un noleggio ha ritiro e riconsegna.
   Il campo "leg" distingue chi ha due estremi da chi ha un solo momento. */
const BOOK_TYPES = {
  flight: {label:'Aereo',    icon:'✈', leg:true,  aLab:'Partenza',  bLab:'Arrivo',      ref:'Codice prenotazione (PNR)'},
  train:  {label:'Treno',    icon:'🚆', leg:true,  aLab:'Partenza',  bLab:'Arrivo',      ref:'Codice biglietto'},
  car:    {label:'Noleggio', icon:'🚗', leg:true,  aLab:'Ritiro',    bLab:'Riconsegna',  ref:'Codice noleggio'},
  stay:   {label:'Alloggio', icon:'🏨', leg:true,  aLab:'Check-in',  bLab:'Check-out',   ref:'Codice prenotazione'},
  tour:   {label:'Escursione',icon:'🥾', leg:false, aLab:'Data e ora', bLab:'',           ref:'Codice prenotazione'},
  ticket: {label:'Biglietto',icon:'🎟', leg:false, aLab:'Data e ora', bLab:'',           ref:'Codice biglietto'}
};

function ensureBooks(){ if(!state.bookings) state.bookings = []; }

/* ordinamento cronologico: le prenotazioni senza data finiscono in coda */
function sortedBookings(){
  ensureBooks();
  return state.bookings.slice().sort((x,y) => {
    if(!x.aWhen && !y.aWhen) return 0;
    if(!x.aWhen) return 1;
    if(!y.aWhen) return -1;
    return x.aWhen.localeCompare(y.aWhen);
  });
}

const fmtWhen = s => {
  if(!s) return '—';
  const [d,t] = s.split('T');
  const [Y,M,D] = d.split('-');
  return D+'/'+M+'/'+Y + (t ? ' · '+t : '');
};
/* giorni che mancano alla scadenza della cancellazione gratuita.
   Confronto le date a mezzanotte, altrimenti una scadenza di ieri sera
   arrotonda a 0 e verrebbe mostrata come "ancora in tempo". */
function daysTo(s){
  if(!s) return null;
  const [Y,M,D] = s.split('-').map(Number);
  const end = new Date(Y, M-1, D);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((end - today) / 86400000);
}

/* riepilogo icona+titolo+costo di una prenotazione: riusato sia nella card
   compatta dell'elenco sia nella scheda di sola visualizzazione */
function bookingHead(b, T){
  return '<span class="bk-ic">'+T.icon+'</span>'+
    '<div class="bk-h">'+
      '<span class="bk-t">'+esc(b.title || T.label)+'</span>'+
      '<span class="bk-s mono">'+esc(T.label)+(b.who ? ' · '+esc(b.who) : '')+'</span>'+
    '</div>'+
    (b.cost ? '<span class="exp-a mono">'+money(parseFloat(b.cost)||0)+'</span>' : '');
}
/* resto dei dettagli (orari, codice, scadenza cancellazione, note, allegato,
   link di gestione): stesso riuso della card compatta e della scheda dedicata */
function bookingBody(b, T){
  const dd = daysTo(b.freeUntil);
  let flag = '';
  if(b.refund === 'free' && b.freeUntil){
    flag = dd < 0
      ? '<span class="bk-flag late">Cancellazione scaduta</span>'
      : '<span class="bk-flag'+(dd <= 7 ? ' soon' : ' ok')+'">Gratis fino al '+fmtWhen(b.freeUntil)+
        (dd <= 30 ? ' · '+dd+'g' : '')+'</span>';
  } else if(b.refund === 'paid'){
    flag = '<span class="bk-flag late">Non rimborsabile</span>';
  }
  return '<div class="bk-when mono">'+
      '<span>'+esc(T.aLab)+': <b>'+fmtWhen(b.aWhen)+'</b>'+(b.aPlace ? ' · '+esc(b.aPlace) : '')+'</span>'+
      (T.leg && (b.bWhen || b.bPlace)
        ? '<span>'+esc(T.bLab)+': <b>'+fmtWhen(b.bWhen)+'</b>'+(b.bPlace ? ' · '+esc(b.bPlace) : '')+'</span>'
        : '')+
    '</div>'+
    (b.ref ? '<div class="bk-ref mono">'+esc(T.ref)+': <b>'+esc(b.ref)+'</b></div>' : '')+
    (flag ? '<div class="bk-flags">'+flag+'</div>' : '')+
    (b.notes ? '<p class="stop-note">'+esc(b.notes)+'</p>' : '')+
    (b.file ? '<button class="bk-att" data-bkf="'+b.id+'">'+
              (/^image\//.test(b.fileType||'') || /^data:image\//.test(b.file)
                ? '<img src="'+esc(b.file)+'" alt="">'
                : '<span class="bk-pdf">📄</span>')+
              '<span class="bk-att-n">'+esc(b.fileName||'Allegato')+'<i>Tocca per aprirlo</i></span>'+
              '</button>' : '')+
    '<div class="links">'+
      (b.url ? '<a href="'+esc(b.url)+'" target="_blank" rel="noopener">Gestisci ↗</a>' : '')+
    '</div>';
}

function drawBooks(){
  ensureBooks();
  const box = document.getElementById('books');

  if(!list.length){
    box.innerHTML = '<div class="cost-sec"><p class="empty" style="padding:0">'+
      'Nessuna prenotazione. Aggiungi voli, treni, alloggi, noleggi ed escursioni: '+
      'qui restano in ordine di data con codici, allegati e scadenze di cancellazione.</p></div>';
    return;
  }

  let h = '<div class="cost-sec"><div class="alt-head mono">'+list.length+' prenotazioni'+
          (tot ? ' · '+money(tot) : '')+'</div>';

  list.forEach(b => {
    const T = BOOK_TYPES[b.type] || BOOK_TYPES.ticket;
    h += '<div class="bk">'+
      '<div class="bk-top">'+
        bookingHead(b, T)+
        '<button class="icon-btn" data-bkv="'+b.id+'" title="Visualizza">👁</button>'+
        '<button class="icon-btn" data-bke="'+b.id+'" title="Modifica">✎</button>'+

  box.querySelectorAll('[data-bkv]').forEach(bt =>
    bt.onclick = () => viewBooking(bt.dataset.bkv));
  box.querySelectorAll('[data-bke]').forEach(bt =>
    bt.onclick = () => openBooking(bt.dataset.bke));
  box.querySelectorAll('[data-bkf]').forEach(bt =>
    bt.onclick = () => {

}

/* ============ visualizzatore allegati ============ */
/* Apre PDF e immagini a schermo pieno dentro l'app. I data URL dei PDF vengono
   convertiti in blob URL: molti browser bloccano l'apertura diretta di un
   data URL in una scheda nuova, mentre il blob funziona ovunque e permette
   anche lo scorrimento delle pagine dentro l'iframe. */
let viewerBlob = null;

function dataToBlobURL(dataUrl){
  try{
    const [head, b64] = dataUrl.split(',');
    const mime = (head.match(/data:([^;]+)/) || [])[1] || 'application/octet-stream';
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
    return URL.createObjectURL(new Blob([arr], {type: mime}));
  }catch(e){ return null; }
}

function openViewer(src, name, mime){
  if(!src) return;
  /* Il tipo noto al momento del caricamento (mime) ha sempre la precedenza:
     un URL di Firebase Storage arrivato da un viaggio condiviso non porta né
     il prefisso data: né un'estensione riconoscibile nel percorso, quindi
     senza questo indizio verrebbe scambiato per un formato non supportato. */
  const isImg = /^image\//.test(mime||'') || /^data:image\//.test(src) || /\.(png|jpe?g|webp|gif|heic)($|\?)/i.test(src);
  const isPdf = /^application\/pdf$/.test(mime||'') || /^data:application\/pdf/.test(src) || /\.pdf($|\?)/i.test(src);
  const body = document.getElementById('vwBody');

  if(viewerBlob){ URL.revokeObjectURL(viewerBlob); viewerBlob = null; }
  document.getElementById('vwName').textContent = name || 'Allegato';

  if(isImg){
    body.innerHTML = '<img src="'+esc(src)+'" alt="'+esc(name||'')+'">';
  } else if(isPdf){
    const url = /^data:/.test(src) ? (viewerBlob = dataToBlobURL(src)) : src;
    body.innerHTML = url
      ? '<iframe src="'+esc(url)+'" title="'+esc(name||'Documento')+'"></iframe>'
      : '<p class="vw-msg">Non riesco ad aprire questo documento.</p>';
  } else {
    /* formati che il browser non sa mostrare: offro il salvataggio */
    body.innerHTML = '<p class="vw-msg">Questo formato non si può visualizzare qui.<br>'+
      '<a class="btn" style="display:inline-block;margin-top:12px;text-decoration:none" '+
      'href="'+esc(src)+'" download="'+esc(name||'allegato')+'">Scarica il file</a></p>';
  }

  const dl = document.getElementById('vwDownload');
  dl.href = src;
  dl.setAttribute('download', name || 'allegato');
  document.getElementById('vwVeil').hidden = false;
}

function closeViewer(){
  document.getElementById('vwVeil').hidden = true;
  document.getElementById('vwBody').innerHTML = '';
  if(viewerBlob){ URL.revokeObjectURL(viewerBlob); viewerBlob = null; }
}
document.getElementById('vwClose').onclick = closeViewer;
document.getElementById('vwVeil').onclick = e => {
  if(e.target === document.getElementById('vwVeil')) closeViewer();
};
window.openViewer = openViewer;

/* ============ editor ============ */
const veil = document.getElementById('veil');
function edit(id){
  editing = state.places.find(p=>p.id===id);
  if(!editing) return;
  map.closePopup();
  document.getElementById('fName').value = editing.name;
  document.getElementById('fNote').value = editing.notes || '';
  document.getElementById('fImg').value = editing.img || '';
  imgPreview(editing.img || '');
  document.getElementById('fCoord').textContent = editing.lat.toFixed(5)+', '+editing.lng.toFixed(5);
  const sel = document.getElementById('fDay');
  sel.innerHTML = '<option value="">Da assegnare</option>' + state.days.map(d=>'<option value="'+d.id+'">'+esc(d.name)+'</option>').join('');
  sel.value = editing.dayId || '';

  const rainB = document.getElementById('fRain'), altB = document.getElementById('fAlt'),
        cityB = document.getElementById('fCity'), chainB = document.getElementById('fChain'),
        kidB = document.getElementById('fKid');
  rainB.classList.toggle('on', !!editing.rain);
  altB.classList.toggle('on', !!editing.alt);
  cityB.classList.toggle('on', !!editing.city);
  chainB.classList.toggle('on', inChain(editing));
  kidB.classList.toggle('on', !!editing.kid);
  rainB.onclick = () => rainB.classList.toggle('on');
  altB.onclick = () => altB.classList.toggle('on');
  cityB.onclick = () => cityB.classList.toggle('on');
  chainB.onclick = () => chainB.classList.toggle('on');
  kidB.onclick = () => kidB.classList.toggle('on');

  const tg = document.getElementById('fType');  tg.innerHTML = '';
  Object.entries(TYPES).forEach(([k,v]) => {
    const b = document.createElement('button');
    b.className = 'type-opt' + ((editing.type||'place') === k ? ' on' : '');
    b.dataset.type = k;
    b.innerHTML = '<svg viewBox="0 0 24 24"><path d="'+v.d+'"/></svg><span>'+esc(v.label)+'</span>';
    b.onclick = () => {
      tg.querySelectorAll('.type-opt').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
    };
    tg.appendChild(b);
  });
  const box = document.getElementById('fLinks');
  box.innerHTML = '';
  (editing.links||[]).forEach(l => linkRow(l.label, l.url));
  veil.hidden = false;
  document.getElementById('fName').focus();
}
window.edit = edit;

function linkRow(label, url){
  const row = document.createElement('div');
  row.className = 'link-row';
  row.innerHTML = '<input class="field lab" placeholder="etichetta"><input class="field url" placeholder="https://…"><button class="icon-btn">✕</button>';
  row.querySelector('.lab').value = label || '';
  row.querySelector('.url').value = url || '';
  row.querySelector('.icon-btn').onclick = () => row.remove();
  document.getElementById('fLinks').appendChild(row);
}
document.getElementById('addLink').onclick = () => linkRow('','');

document.getElementById('save').onclick = () => {
  editing.name = document.getElementById('fName').value.trim() || 'Tappa';
  editing.notes = document.getElementById('fNote').value;
  editing.img = document.getElementById('fImg').value.trim();
  editing.dayId = document.getElementById('fDay').value || null;
  editing.type = (document.querySelector('#fType .type-opt.on') || {dataset:{type:'place'}}).dataset.type;
  editing.rain = document.getElementById('fRain').classList.contains('on');
  editing.kid  = document.getElementById('fKid').classList.contains('on');
  editing.alt  = document.getElementById('fAlt').classList.contains('on');
  editing.city = document.getElementById('fCity').classList.contains('on');
  editing.chain = document.getElementById('fChain').classList.contains('on');
  editing.links = [...document.querySelectorAll('#fLinks .link-row')].map(r => ({
    label: r.querySelector('.lab').value.trim(),
    url: r.querySelector('.url').value.trim()
  })).filter(l => l.url).map(l => ({label:l.label, url:/^https?:/i.test(l.url)?l.url:'https://'+l.url}));
  veil.hidden = true; save(); render();
};
document.getElementById('fMove').onclick = () => {
  moving = editing.id;
  veil.hidden = true;
  document.body.classList.add('moving');
  if(window.matchMedia('(max-width:880px)').matches) setView('map');
  map.panTo([editing.lat, editing.lng]);
};

document.getElementById('cancel').onclick = () => veil.hidden = true;

/* elimina una tappa con conferma: condivisa tra il pulsante "Elimina" della
   scheda di modifica e il ✕ diretto sulle card dell'elenco, per non tenere
   la stessa logica in due posti */
function deletePlace(id){
  const p = state.places.find(x => x.id === id);
  if(!p || !confirm('Elimino "'+p.name+'"?')) return;
  state.places = state.places.filter(x => x.id !== id);
  if(editing && editing.id === id) veil.hidden = true;
  save(); render();
}
document.getElementById('del').onclick = () => deletePlace(editing.id);
veil.onclick = e => { if(e.target === veil) veil.hidden = true; };
const gveil = document.getElementById('gmapsVeil');
document.getElementById('gmapsClose').onclick = () => gveil.hidden = true;
gveil.onclick = e => { if(e.target === gveil) gveil.hidden = true; };
/* ============ popover informativo (ⓘ) ============ */
const infoPop = document.getElementById('infoPop');
function showInfo(btn, text){
  infoPop.textContent = text;
  infoPop.hidden = false;
  const r = btn.getBoundingClientRect(), pw = 260;
  let left = Math.min(r.left, window.innerWidth - pw - 12);
  infoPop.style.left = Math.max(12, left) + 'px';
  infoPop.style.top = (r.bottom + 6) + 'px';
}
function hideInfo(){ infoPop.hidden = true; }
document.querySelectorAll('.info-btn').forEach(b => {
  b.onclick = e => {
    e.stopPropagation();
    const same = !infoPop.hidden && infoPop.dataset.for === b.dataset.info;
    hideInfo();
    if(!same){ infoPop.dataset.for = b.dataset.info; showInfo(b, b.dataset.info); }
  };
  b.onkeydown = e => { if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); b.onclick(e); } };
});
document.addEventListener('click', e => {
  if(!infoPop.hidden && !infoPop.contains(e.target) && !e.target.classList.contains('info-btn')) hideInfo();
});

document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    hideInfo();
    if(moving){ moving = null; document.body.classList.remove('moving'); return; }
    if(pickMode){ setPick(false); return; }
    if(!document.getElementById('vwVeil').hidden){ closeViewer(); return; }
    veil.hidden = true; gveil.hidden = true;
    document.getElementById('xVeil').hidden = true;
    document.getElementById('bVeil').hidden = true;
    document.getElementById('bViewVeil').hidden = true;
    document.getElementById('tripsVeil').hidden = true;
    document.getElementById('wxVeil').hidden = true;
  }
});

/* ============ comandi ============ */
document.getElementById('tripTitle').oninput = e => { state.title = e.target.value; save(); };

function setPick(v){
  pickMode = v;
  /* nessun pulsante fisso da evidenziare: l'indicazione "tocca la mappa" vive
     nella pillola fissa in alto (stesso principio già usato per lo spostamento
     tappa, .moving), perché il pulsante che ha attivato la modalità appartiene
     a un popup che si chiude subito dopo */
  document.body.classList.toggle('picking', v);
  document.getElementById('map').style.cursor = v ? 'crosshair' : '';
}

/* ============ aggiungi un luogo (ricerca o tocco sulla mappa) ============ */
document.getElementById('btnPickInline').onclick = () => {
  setPick(true);
  closeSheetMobile();
};

document.getElementById('btnFit').onclick = () => {  if(!state.places.length) return;
  map.fitBounds(L.latLngBounds(state.places.map(p=>[p.lat,p.lng])).pad(.2));
  closeSheetMobile();
};

/* i nomi si possono spegnere quando la mappa è troppo fitta */
let labsOff = false;
document.getElementById('btnLabs').onclick = e => {
  labsOff = !labsOff;
  e.target.classList.toggle('on', !labsOff);
  document.body.classList.toggle('labs-off', labsOff);
};

document.getElementById('btnDay').onclick = () => {
  state.days.push({id:uid(), name:'Giorno '+(state.days.length+1), color:PALETTE[state.days.length % PALETTE.length]});
  save(); render();
  document.getElementById('list').scrollTop = 1e6;
};

document.getElementById('btnExport').onclick = () => {
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (state.title||'viaggio').replace(/\W+/g,'-').toLowerCase()+'.json';
  a.click();
  dirty = false;
  badge(storageOK === true ? 'saved' : 'off');
};
document.getElementById('btnImport').onclick = () => document.getElementById('file').click();
document.getElementById('file').onchange = e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = async () => {
    try{
      const j = JSON.parse(r.result);
      if(!j.days || !j.places) throw 0;
      /* Import non sovrascrive mai in silenzio il viaggio aperto: se il file porta
         l'id di un viaggio già presente si chiede conferma, altrimenti diventa
         sempre un nuovo viaggio nell'elenco (id nuovo se il file non ne aveva uno). */
      const known = j.id && tripIndex.some(t => t.id === j.id);
      if(known){
        const title = (tripIndex.find(t=>t.id===j.id)||{}).title || 'un viaggio';
        if(!confirm('Questo file è un salvataggio di "'+title+'", già presente. Sovrascrivere quel viaggio con il contenuto del file?')) return;
      }
      if(!j.id) j.id = uid();
      state = j;
      normalize();
      if(db){
        await dbSet(tripKey(state.id), state);
        await touchIndex(state.id, state.title, Date.now());
        await dbSet(ACTIVE_KEY, state.id);
        storageOK = true;
      }
      document.getElementById('tripTitle').value = state.title || '';
      render(); drawCosts();
      badge(storageOK ? 'saved' : 'unsaved');
      if(state.places.length) map.fitBounds(L.latLngBounds(state.places.map(p=>[p.lat,p.lng])).pad(.2));
      subscribeShared(state.shareId);
    }catch(err){ alert('Il file non è un itinerario di Rotta.'); }
  };
  r.readAsText(f);
  e.target.value = '';
};

/* ============ navigazione ============ */
/* Tre viste di pari livello: Mappa · Itinerario · Spese.
   Su desktop la mappa e il pannello convivono, quindi "Mappa" chiude solo il pannello;
   su mobile il pannello scorre sopra la mappa. */
const tabMap  = document.getElementById('tabMap'),
      tabList = document.getElementById('tabList'),
      tabCost = document.getElementById('tabCost'),
      tabBook = document.getElementById('tabBook'),
      tabCal  = document.getElementById('tabCal');
const listEl = document.getElementById('list'), costEl = document.getElementById('costs');
let view = 'map';

function setView(v){
  view = v;
  const cost = v === 'cost', book = v === 'book', mapv = v === 'map', cal = v === 'cal';
  const geo  = !cost && !book && !cal;   // Mappa e Itinerario lavorano sui luoghi
  listEl.hidden = !(v === 'list');
  costEl.hidden = !cost;
  document.getElementById('books').hidden = !book;
  document.getElementById('calBox').hidden = !cal;
  /* ricerca luoghi e strumenti mappa non hanno senso su spese, prenotazioni e calendario */
  document.getElementById('mapTools').hidden = !geo;
  document.getElementById('searchBox').hidden = !geo;
  /* "＋ Giorno" serve solo dove si vedono i giorni */
  document.getElementById('btnDay').hidden = v !== 'list';
  document.getElementById('btnExpense').hidden = !cost;
  document.getElementById('btnBooking').hidden = !book;
  /* in vista Mappa il pannello resta aperto ma ridotto ai soli comandi */
  document.body.classList.toggle('panel-open', true);
  document.body.classList.toggle('map-view', mapv);
  [[tabMap,'map'],[tabList,'list'],[tabCost,'cost'],[tabBook,'book'],[tabCal,'cal']]
    .forEach(([b,k]) => b.classList.toggle('on', v === k));
  if(cost) drawCosts();
  if(book) drawBooks();
  if(cal) drawCalendar();
  map.invalidateSize();
  setTimeout(() => map.invalidateSize(), 300);
}
tabCal.onclick  = () => setView('cal');
tabMap.onclick  = () => setView('map');
tabList.onclick = () => setView('list');
tabCost.onclick = () => setView('cost');
tabBook.onclick = () => setView('book');
document.getElementById('btnBooking').onclick = () => openBooking(null);
document.getElementById('btnExpense').onclick = openExpense;
/* usata dopo un'azione sulla mappa: torna alla mappa su mobile, innocua su desktop */
function closeSheetMobile(){ if(window.matchMedia('(max-width:880px)').matches) setView('map'); }

/* ============ installazione e funzionamento offline ============ */
/* Versione dell'applicazione: se il service worker registrato ne dichiara una
   diversa, è rimasto un worker vecchio in circolazione e lo rimuovo d'ufficio.
   Senza questo, una versione difettosa in cache continuerebbe a servire sé
   stessa impedendo a qualunque correzione di arrivare. */


if('serviceWorker' in navigator){
  window.addEventListener('load', async () => {
    try{
      const reg = await navigator.serviceWorker.register('./sw.js');

      /* chiedo al worker attivo quale versione sta girando */
      const attiva = await new Promise(res => {
        const sw = navigator.serviceWorker.controller;
        if(!sw) return res(null);
        const ch = new MessageChannel();
        ch.port1.onmessage = e => res(e.data && e.data.version);
        try{ sw.postMessage('version', [ch.port2]); }catch(e){ res(null); }
        setTimeout(() => res(null), 1200);
      });

      /* Un worker che non risponde entro il tempo limite è una versione
         precedente al protocollo 'version': va rimossa anche quella. */
      const controllato = !!navigator.serviceWorker.controller;
      if(controllato && attiva !== APP_VERSION){
        /* worker obsoleto: lo tolgo di mezzo e ricarico una volta sola */
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
        if(!sessionStorage.getItem('rotta-ripulito')){
          sessionStorage.setItem('rotta-ripulito', '1');
          location.reload();
        }
        return;
      }

      const check = () => {
        const b = document.getElementById('updateBar');
        if(!b) return;
        b.hidden = !(reg.waiting && navigator.serviceWorker.controller
                     && reg.waiting !== navigator.serviceWorker.controller);
      };
      check();
      reg.addEventListener('updatefound', () => {
        const w = reg.installing;
        if(!w) return;
        w.addEventListener('statechange', () => {
          if(w.state === 'installed') check();
          if(w.state === 'activated' || w.state === 'redundant'){
            const b = document.getElementById('updateBar');
            if(b) b.hidden = true;
          }
        });
      });
    }catch(e){ console.warn('service worker non registrato:', e && e.message); }
  });
}

document.getElementById('updateDismiss').onclick = () => {
  document.getElementById('updateBar').hidden = true;
};

document.getElementById('updateNow').onclick = async () => {
  const b = document.getElementById('updateBar');
  if(b) b.hidden = true;
  const r = await navigator.serviceWorker.getRegistration();
  if(r && r.waiting){
    /* Ricaricare subito non basta: il nuovo worker resta "waiting" e al riavvio
       l'avviso ricompare all'infinito. Aspetto che prenda davvero il controllo. */
    r.waiting.postMessage('skipWaiting');
    let done = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(done) return;
      done = true;
      location.reload();
    });
    /* rete di sicurezza se controllerchange non arriva */
    setTimeout(() => { if(!done){ done = true; location.reload(); } }, 2500);
  } else {
    location.reload();
  }
};

/* invito all'installazione: Chrome lo consente solo dopo un gesto dell'utente */
let installEvt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  installEvt = e;
  const b = document.getElementById('btnInstall');
  if(b) b.hidden = false;
});
document.getElementById('btnInstall').onclick = async () => {
  if(!installEvt) return;
  installEvt.prompt();
  await installEvt.userChoice;
  installEvt = null;
  document.getElementById('btnInstall').hidden = true;
};
window.addEventListener('appinstalled', () => {
  const b = document.getElementById('btnInstall');
  if(b) b.hidden = true;
});

boot();
</script>
