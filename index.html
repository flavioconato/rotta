<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rotta — mappa di viaggio</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#12202B">
<meta name="description" content="Itinerari su mappa con tappe, spese condivise e prenotazioni. Funziona offline.">
<link rel="icon" href="./favicon.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rotta">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Public+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12202B;
  --ink-2:#1B2E3C;
  --ink-3:#2A4152;
  --paper:#EDE8DE;
  --paper-2:#DCD5C7;
  --moss:#4C7A5A;
  --ochre:#E0A32E;
  --rust:#B8492C;
  --fog:#8FA3B0;
  --r:10px;
  --rail:2px;
}
*{box-sizing:border-box}
/* L'attributo hidden vale display:none a priorità minima: qualunque regola che
   imposti display (flex, grid…) lo annulla silenziosamente. Lo rendo vincolante
   ovunque, altrimenti gli elementi nascosti via JS restano visibili. */
[hidden]{display:none!important}
html,body{margin:0;height:100%}
body{
  font-family:"Public Sans",system-ui,sans-serif;
  background:var(--ink);
  color:var(--paper);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
button,input,textarea,select{font:inherit;color:inherit}
button{cursor:pointer;background:none;border:0}
:focus-visible{outline:2px solid var(--ochre);outline-offset:2px}
.mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;letter-spacing:.02em}

/* ---------- layout ---------- */
.app{display:grid;grid-template-columns:390px 1fr;height:100dvh}
/* Il pannello si ritira solo da desktop, dove sta ACCANTO alla mappa.
   Sotto 880px il pannello è sovrapposto (grid-area 1/1): lì la colonna non va toccata,
   altrimenti si azzera anche la cella della mappa. */
@media (min-width:881px){
  .app{transition:grid-template-columns .26s cubic-bezier(.3,.8,.4,1)}
  body:not(.panel-open) .app{grid-template-columns:0 1fr}
  body:not(.panel-open) .panel{overflow:hidden;border-right-color:transparent}
}
.panel{background:var(--ink);display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--ink-3);z-index:1200}
#map{height:100%;width:100%;background:var(--paper-2)}

/* ---------- header ---------- */
.head{padding:16px 16px 12px;border-bottom:1px solid var(--ink-3)}
.eyebrow-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.eyebrow{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fog)}
.save-state{
  font-size:10px;letter-spacing:.06em;color:var(--fog);
  display:inline-flex;align-items:center;gap:5px;white-space:nowrap
}
.save-state::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--fog)}
.save-state.ok{color:var(--moss)}
.save-state.ok::before{background:var(--moss)}
.save-state.warn{color:var(--ochre)}
.save-state.warn::before{background:var(--ochre)}
#tripTitle{
  display:block;width:100%;background:none;border:0;padding:2px 0 0;
  font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:27px;line-height:1.05;
  color:var(--paper);letter-spacing:-.02em;
}
#tripTitle::placeholder{color:var(--ink-3)}
.head-row{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.chip{
  border:1px solid var(--ink-3);border-radius:999px;padding:5px 11px;
  font-size:12px;font-weight:500;color:var(--paper);background:var(--ink-2);
  display:inline-flex;align-items:center;gap:6px;transition:.15s;
}
.chip:hover{border-color:var(--fog)}
.chip.on{background:var(--ochre);border-color:var(--ochre);color:#20170A;font-weight:600}

/* ---------- search ---------- */
.search{position:relative;padding:12px 16px;border-bottom:1px solid var(--ink-3)}
.search-label{
  font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--fog);margin-bottom:8px;
}
.search input{
  width:100%;background:var(--ink-2);border:1px solid var(--ink-3);border-radius:var(--r);
  padding:10px 12px;font-size:14px;
}
.search input::placeholder{color:var(--fog)}
.results{
  position:absolute;left:16px;right:16px;top:56px;z-index:20;
  background:var(--ink-2);border:1px solid var(--ink-3);border-radius:var(--r);overflow:hidden;
  box-shadow:0 18px 40px rgba(0,0,0,.45);max-height:280px;overflow-y:auto
}
.results button{display:block;width:100%;text-align:left;padding:10px 12px;font-size:13px;line-height:1.3;border-bottom:1px solid var(--ink-3)}
.results button:last-child{border-bottom:0}
.results button:hover{background:var(--ink-3)}
.results .muted{display:block;color:var(--fog);font-size:11px;margin-top:2px}
.hint{color:var(--fog);font-size:12px;padding:8px 12px}

/* ---------- days ---------- */
.scroll{flex:1;overflow-y:auto;padding:4px 0 90px;scrollbar-width:thin}
.day{border-bottom:1px solid var(--ink-3)}
.day-head{display:flex;align-items:center;flex-wrap:wrap;gap:9px;padding:13px 16px 9px}
.swatch{width:11px;height:11px;border-radius:3px;flex:none;box-shadow:0 0 0 3px rgba(255,255,255,.06)}
.day-date{
  flex:none;width:120px;background:var(--ink-2);border:1px solid var(--ink-3);border-radius:6px;
  padding:4px 6px;font-size:11px;color:var(--paper);color-scheme:dark;
}
.day-name{
  flex:1;min-width:0;background:none;border:0;padding:0;
  font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:15px;letter-spacing:-.01em
}
.day-stat{color:var(--fog);flex:none}
.day-wx{color:var(--fog);flex:none;font-size:11px;white-space:nowrap}
.day-wx.tap{
  cursor:pointer;color:var(--paper);background:var(--ink-2);
  border:1px solid var(--ink-3);border-radius:999px;padding:3px 9px 3px 8px;
}
.day-wx.tap:hover{border-color:var(--fog)}
.day-wx.tap:active{background:var(--ink-3)}
.day-wx.rain-ready{color:#20170A;background:var(--ochre);border-color:var(--ochre)}
/* ---------- widget meteo dettagliato ---------- */
.wx-main{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.wx-ic{font-size:34px;line-height:1}
.wx-main b{font-size:20px;font-family:"Bricolage Grotesque",sans-serif;display:block}
.wx-main i{display:block;font-style:normal;color:var(--fog);font-size:12.5px;margin-top:2px;text-transform:capitalize}
.wx-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;font-size:12px;color:var(--fog)}
.wx-hours{display:flex;overflow-x:auto;gap:5px;padding-bottom:2px}
.wx-hour{
  flex:none;width:44px;text-align:center;display:flex;flex-direction:column;gap:3px;
  font-size:10.5px;color:var(--fog);background:var(--ink-2);border:1px solid var(--ink-3);
  border-radius:8px;padding:7px 2px;
}
.wx-hour span:nth-child(2){font-size:15px}
.icon-btn{color:var(--fog);padding:4px 5px;border-radius:6px;font-size:13px;line-height:1}
.icon-btn:hover{color:var(--paper);background:var(--ink-3)}
@keyframes flashDay{from{background:rgba(224,163,46,.18)}to{background:transparent}}
.day.flash{animation:flashDay 1.6s ease-out}

/* ---------- il nastro (signature) ---------- */
.rail{list-style:none;margin:0;padding:0 16px 14px 16px}
.stop{position:relative;padding-left:34px;padding-bottom:4px}
.stop::before{ /* filo del percorso */
  content:"";position:absolute;left:11px;top:22px;bottom:-6px;width:var(--rail);
  background:repeating-linear-gradient(to bottom,var(--c,var(--fog)) 0 5px,transparent 5px 10px);
  opacity:.55;
}
.stop:last-child::before{display:none}
.node{
  position:absolute;left:0;top:2px;width:26px;height:26px;border-radius:50%;
  display:grid;place-items:center;
  background:var(--c,var(--fog));
}
.node svg{width:15px;height:15px;fill:#0E1A22}
.node-n{
  position:absolute;top:-4px;right:-4px;min-width:15px;height:15px;padding:0 3px;
  border-radius:8px;background:var(--ink);color:var(--paper);border:1px solid var(--ink-3);
  font-family:"JetBrains Mono",monospace;font-size:9px;font-weight:600;
  display:grid;place-items:center
}
.stop-card{background:var(--ink-2);border:1px solid var(--ink-3);border-radius:var(--r);padding:9px 11px}
.stop-card:hover{border-color:var(--c,var(--fog))}
.stop-top{display:flex;gap:8px;align-items:flex-start}
.stop-name{flex:1;font-weight:600;font-size:14px;line-height:1.25;cursor:pointer;text-align:left}
.stop-note{color:var(--fog);font-size:12.5px;line-height:1.4;margin:5px 0 0;white-space:pre-wrap}
.links{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.links a{
  font-size:11.5px;text-decoration:none;color:var(--ochre);
  border:1px solid rgba(224,163,46,.35);border-radius:999px;padding:3px 8px
}
.links a:hover{background:rgba(224,163,46,.14)}
.seg{display:flex;align-items:center;gap:7px;color:var(--fog);padding:6px 0 6px 0;margin-left:-34px;padding-left:34px}
.seg::before{content:"";width:0}
.empty{color:var(--fog);font-size:12.5px;padding:0 16px 14px 16px;line-height:1.45}

/* etichetta col nome sotto il pin */
.pin-lab{
  position:absolute;top:36px;left:17px;
  transform:translateX(-50%) scale(var(--lab-scale,1));transform-origin:top center;
  max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  background:rgba(18,32,43,.88);color:var(--paper);
  border:1px solid rgba(255,255,255,.14);border-radius:5px;padding:2px 6px;
  font-family:"Public Sans",sans-serif;font-size:11px;font-weight:600;line-height:1.25;
  text-shadow:0 1px 2px rgba(0,0,0,.5);box-shadow:0 2px 6px rgba(0,0,0,.35);
  pointer-events:none;text-align:center
}
.pin-lab.dim{opacity:.72;font-weight:500}
body.hide-labs .pin-lab,
body.labs-off .pin-lab{display:none}
/* modalità spostamento tappa */
body.moving #map{cursor:crosshair}
body.moving::after{
  content:"Tocca la mappa per spostare la tappa";
  position:fixed;z-index:1700;top:14px;left:50%;transform:translateX(-50%);
  background:var(--ochre);color:#20170A;font-weight:700;font-size:12.5px;
  padding:9px 15px;border-radius:999px;box-shadow:0 6px 18px rgba(0,0,0,.4);
  pointer-events:none;white-space:nowrap
}
body.picking #map{cursor:crosshair}
body.picking::after{
  content:"Tocca la mappa per aggiungere una tappa";
  position:fixed;z-index:1700;top:14px;left:50%;transform:translateX(-50%);
  background:var(--ochre);color:#20170A;font-weight:700;font-size:12.5px;
  padding:9px 15px;border-radius:999px;box-shadow:0 6px 18px rgba(0,0,0,.4);
  pointer-events:none;white-space:nowrap
}
/* ---------- installazione e aggiornamenti ---------- */
.act.ghost.install{background:var(--moss);border-color:var(--moss);color:#0E1A22;font-weight:800}
#updateBar, #syncBar{
  position:fixed;z-index:1800;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:10px;white-space:nowrap;
  background:var(--paper);color:var(--ink);border-radius:999px;
  padding:9px 10px 9px 16px;font-size:12.5px;font-weight:600;
  box-shadow:0 8px 24px rgba(0,0,0,.45)
}
#updateBar{bottom:96px}
/* più in alto dell'avviso di aggiornamento app: se compaiono insieme si impilano */
#syncBar{bottom:150px}
/* display:flex vince sulla regola implicita di [hidden] (display:none),
   quindi la barra resterebbe visibile sempre: va dichiarato esplicitamente. */
#updateBar[hidden], #syncBar[hidden]{display:none}
#updateBar button, #syncBar button{
  background:var(--ink);color:var(--paper);border-radius:999px;
  padding:6px 13px;font-size:12px;font-weight:700
}
#updateDismiss, #syncDismiss{padding:6px 10px!important;background:none!important;color:var(--fog)!important}
#updateDismiss:hover, #syncDismiss:hover{color:var(--ink)!important}
/* ---------- visualizzatore allegati ---------- */
.viewer{
  width:min(1000px,100%);height:min(88dvh,100%);display:flex;flex-direction:column;
  background:var(--ink);border:1px solid var(--ink-3);border-radius:14px;overflow:hidden
}
.vw-head{
  display:flex;align-items:center;gap:8px;padding:11px 12px;
  border-bottom:1px solid var(--ink-3);flex:none
}
.vw-head span{flex:1;min-width:0;font-size:13.5px;font-weight:600;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vw-btn{
  flex:none;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
  background:var(--ink-2);border:1px solid var(--ink-3);color:var(--paper);
  font-size:15px;text-decoration:none
}
.vw-btn:hover{border-color:var(--fog)}
.vw-body{flex:1;min-height:0;background:#0C141B;display:flex}
.vw-body img{width:100%;height:100%;object-fit:contain;background:#0C141B}
.vw-body iframe{width:100%;height:100%;border:0;background:#fff}
.vw-msg{margin:auto;text-align:center;color:var(--fog);font-size:14px;padding:24px;line-height:1.5}
/* anteprime cliccabili */
.img-prev.tap{cursor:zoom-in}
.img-prev.tap:hover{border-color:var(--ochre)}
.pdf-card{
  display:flex;align-items:center;gap:10px;width:100%;margin-top:7px;text-align:left;
  background:var(--ink-2);border:1px solid var(--ink-3);border-radius:var(--r);
  padding:12px;font-size:20px;color:var(--paper)
}
.pdf-card:hover{border-color:var(--ochre)}
.pdf-card b{display:block;font-size:13.5px;font-weight:600}
.pdf-card i{display:block;font-style:normal;font-size:11px;color:var(--fog);margin-top:1px}
/* allegato nell'elenco prenotazioni */
.bk-att{
  display:flex;align-items:center;gap:9px;width:100%;text-align:left;margin:8px 0 0 27px;
  background:var(--ink-2);border:1px solid var(--ink-3);border-radius:var(--r);padding:7px;
  width:calc(100% - 27px)
}
.bk-att:hover{border-color:var(--ochre)}
.bk-att img{width:52px;height:40px;object-fit:cover;border-radius:6px;flex:none}
.bk-pdf{
  width:52px;height:40px;border-radius:6px;flex:none;display:grid;place-items:center;
  background:var(--ink);font-size:19px
}
.bk-att-n{flex:1;min-width:0;font-size:12.5px;font-weight:600;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bk-att-n i{display:block;font-style:normal;font-size:10.5px;color:var(--fog);font-weight:400;margin-top:1px}
/* ---------- prenotazioni ---------- */
.bk{padding:11px 0;border-bottom:1px solid var(--ink-3)}
.bk:last-child{border-bottom:0}
.bk-top{display:flex;align-items:flex-start;gap:9px}
.bk-ic{font-size:18px;line-height:1.2;flex:none}
.bk-h{flex:1;min-width:0}
.bk-t{display:block;font-size:14px;font-weight:600;line-height:1.25}
.bk-s{display:block;color:var(--fog);font-size:10px;margin-top:1px}
.bk-when{display:flex;flex-direction:column;gap:2px;margin:7px 0 0 27px;color:var(--fog);font-size:10.5px}
.bk-when b{color:var(--paper);font-weight:600}
.bk-ref{margin:5px 0 0 27px;color:var(--fog);font-size:10.5px}
.bk-ref b{color:var(--ochre);font-weight:600;letter-spacing:.06em}
.bk-flags{margin:7px 0 0 27px}
.bk-flag{
  display:inline-block;font-family:"JetBrains Mono",monospace;font-size:9.5px;font-weight:600;
  padding:3px 8px;border-radius:999px;letter-spacing:.04em
}
.bk-flag.ok{background:rgba(76,122,90,.22);color:#7ec99a;border:1px solid rgba(76,122,90,.5)}
.bk-flag.soon{background:rgba(224,163,46,.18);color:var(--ochre);border:1px solid rgba(224,163,46,.5)}
.bk-flag.late{background:rgba(184,73,44,.16);color:#e08a72;border:1px solid rgba(184,73,44,.45)}
.bk .stop-note{margin-left:27px}
.bk .links{margin-left:27px}
/* con quattro voci le etichette vanno strette */
.tabs button{padding:8px 2px;font-size:11.5px}
/* ---------- immagini ---------- */
.pop-img{
  display:block;width:calc(100% + 28px);margin:-12px -14px 8px;
  height:130px;object-fit:cover;border-radius:12px 12px 0 0
}
.thumb{
  display:block;width:100%;height:88px;object-fit:cover;
  border-radius:7px;margin-top:7px;border:1px solid var(--ink-3)
}
.img-row{display:flex;gap:6px}
.img-row .field{flex:1;font-size:12.5px}
.img-row .act.ghost{flex:0 0 42px;padding:9px;font-size:14px}
.img-prev{
  display:block;width:100%;height:120px;object-fit:cover;
  border-radius:var(--r);margin-top:7px;border:1px solid var(--ink-3)
}
/* ---------- pulsanti dei dialog ---------- */
.btn{
  flex:1;border-radius:var(--r);padding:11px;font-weight:600;font-size:13.5px;text-align:center;
  background:var(--paper);color:var(--ink)
}
.btn.ghost{background:var(--ink-2);color:var(--paper);border:1px solid var(--ink-3);flex:0 0 auto;padding:11px 13px}

/* ---------- editor ---------- */
.veil{position:fixed;inset:0;background:rgba(9,16,21,.6);backdrop-filter:blur(2px);z-index:2000;display:grid;place-items:center;padding:16px}
.veil[hidden]{display:none}
.sheet{
  width:min(460px,100%);max-height:88dvh;overflow-y:auto;background:var(--ink);
  border:1px solid var(--ink-3);border-radius:16px;padding:18px
}
.sheet h2{font-family:"Bricolage Grotesque",sans-serif;font-size:19px;margin:0 0 14px;letter-spacing:-.01em}
label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--fog);margin:12px 0 5px;font-family:"JetBrains Mono",monospace}
.field{width:100%;background:var(--ink-2);border:1px solid var(--ink-3);border-radius:var(--r);padding:9px 11px;font-size:14px}
textarea.field{min-height:84px;resize:vertical;line-height:1.45}
.type-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:6px}
.type-opt{
  display:flex;flex-direction:column;align-items:center;gap:5px;padding:9px 4px;
  border:1px solid var(--ink-3);border-radius:var(--r);background:var(--ink-2);
  font-size:10.5px;line-height:1.15;text-align:center;color:var(--fog);transition:.14s
}
.type-opt svg{width:19px;height:19px;fill:var(--fog)}
.type-opt:hover{border-color:var(--fog);color:var(--paper)}
.type-opt.on{background:var(--ochre);border-color:var(--ochre);color:#20170A;font-weight:600}
.type-opt.on svg{fill:#20170A}
/* badge pioggia sul pin */
.pin-r{
  position:absolute;bottom:-2px;left:-6px;width:20px;height:20px;border-radius:50%;
  background:#F2FBF4;border:1.5px solid #2F9E44;display:grid;place-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,.28)
}
.pin-r svg{width:12px;height:12px;fill:#6E8AA0;position:absolute;top:2px}
.pin-r b{position:absolute;right:1px;bottom:0;font-size:9px;color:#2F9E44;font-weight:800;line-height:1}
/* pin alternativo: contorno tratteggiato, niente numero */
.pin.alt{border-style:dashed;border-color:rgba(255,255,255,.95);filter:saturate(.75)}
.pin-a{
  position:absolute;top:-5px;right:-8px;height:15px;padding:0 4px;border-radius:8px;
  background:var(--ink);color:var(--ochre);border:1px solid var(--ochre);
  font-family:"JetBrains Mono",monospace;font-size:8px;font-weight:700;letter-spacing:.06em;
  display:grid;place-items:center
}
/* etichetta tempo sulla tratta */
.leg-lab{
  position:absolute;transform:translate(-50%,-50%) scale(var(--leg-scale,1));transform-origin:center;
  white-space:nowrap;background:var(--ink);color:var(--paper);
  border:1px solid var(--c,var(--fog));border-left:3px solid var(--c,var(--fog));
  border-radius:5px;padding:2px 6px;
  font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:600;
  box-shadow:0 2px 6px rgba(0,0,0,.3);pointer-events:none
}
body.hide-legs .leg-lab{display:none}
/* tag pioggia in elenco */
.rain-tag{font-style:normal;color:#4ec27a;margin-left:3px}
/* ---------- vista calendario ---------- */
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:14px 16px}
.cal-tile{
  position:relative;text-align:left;border:1px solid var(--ink-3);border-left:3px solid var(--c,var(--fog));
  border-radius:var(--r);background:var(--ink-2);padding:10px 32px 10px 11px;
  display:flex;flex-direction:column;gap:4px;
}
.cal-tile:hover{border-color:var(--fog)}
.cal-tile.rain-ready{border-color:var(--ochre)}
.cal-date{color:var(--fog);font-size:10px;letter-spacing:.06em;text-transform:uppercase}
.cal-name{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:14px;line-height:1.25}
.cal-stat{color:var(--fog);font-size:10.5px}
.cal-wx{font-size:11px;color:var(--fog)}
.cal-badge{position:absolute;top:9px;right:9px;font-size:14px}
.cal-badge.warn{opacity:.4;filter:grayscale(1)}
/* blocco alternative */
.alt-box{margin:0 16px 14px;border:1px dashed var(--ink-3);border-radius:var(--r);padding:9px 10px;background:rgba(255,255,255,.02)}
.alt-head{color:var(--ochre);letter-spacing:.1em;text-transform:uppercase;font-size:9.5px;margin-bottom:8px}
.alt-item{display:flex;gap:9px;align-items:flex-start;padding:6px 0;border-top:1px solid var(--ink-3)}
.alt-item:first-of-type{border-top:0}
.alt-node{
  flex:none;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
  background:transparent;border:1.5px dashed var(--c,var(--fog))
}
.alt-node svg{width:13px;height:13px;fill:var(--c,var(--fog))}
.alt-body{flex:1;min-width:0}
.alt-body .stop-name{font-size:13.5px;font-weight:600;text-align:left;width:100%}
/* interruttori meteo */
.toggle{
  display:flex;gap:9px;align-items:flex-start;width:100%;text-align:left;margin-bottom:6px;
  border:1px solid var(--ink-3);border-radius:var(--r);background:var(--ink-2);padding:9px 10px
}
.toggle .tick{
  flex:none;width:18px;height:18px;border-radius:5px;border:1.5px solid var(--ink-3);
  display:grid;place-items:center;font-size:11px;color:transparent;margin-top:1px
}
.toggle b{font-size:13px;font-weight:600}
.toggle.on{border-color:var(--moss);background:rgba(76,122,90,.14)}
.toggle.on .tick{background:var(--moss);border-color:var(--moss);color:#0E1A22}
/* icona informativa: apre un piccolo popover di testo, al posto del vecchio
   sottotitolo sempre visibile sotto ogni comando */
.info-btn{
  display:inline-grid;place-items:center;width:15px;height:15px;border-radius:50%;
  background:var(--ink-3);color:var(--fog);font-size:10px;font-weight:700;margin-left:5px;
  cursor:pointer;vertical-align:middle;user-select:none;
}
.info-btn:hover{color:var(--paper);border:1px solid var(--fog)}
.info-pop{
  position:fixed;z-index:2400;max-width:260px;background:var(--ink-2);color:var(--paper);
  border:1px solid var(--ink-3);border-radius:10px;padding:10px 12px;font-size:12.5px;line-height:1.45;
  box-shadow:0 10px 26px rgba(0,0,0,.45);
}
.info-pop[hidden]{display:none}
/* segnaposto di servizio: pin più piccolo e sobrio, senza numero */
.pin.poi{width:26px;height:26px;border-width:1.5px;opacity:.92}
.pin.poi svg{width:14px;height:14px}
.leg-lab.walk{border-style:dashed}
.foot-km{display:inline-block;margin-left:6px;color:var(--moss);font-weight:600}
/* contrassegno Francesco, in basso a destra del pin */
.pin-k{
  position:absolute;bottom:-2px;right:-6px;width:20px;height:20px;border-radius:50%;
  background:#FFF6E8;border:1.5px solid var(--ochre);display:grid;place-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,.28)
}
.pin-k svg{width:12px;height:12px;fill:#8A5B12}
.kid-tag{font-style:normal;margin-left:3px;font-size:11px}
/* glifo del tipo sul pin alternativo */
.pin-t{
  position:absolute;bottom:-2px;left:-6px;width:19px;height:19px;border-radius:50%;
  background:var(--ink);border:1.5px solid rgba(255,255,255,.85);display:grid;place-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,.3)
}
.pin-t svg{width:11px;height:11px;fill:var(--paper)}
.pin.rainpin svg{fill:#0E1A22}
/* commutatore viste */
/* spese */
.cost-sec{padding:14px 16px;border-bottom:1px solid var(--ink-3)}
.who-list{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
.who{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--ink-3)}
.who:last-child{border-bottom:0}
.who-n{flex:1;font-size:13.5px;font-weight:600}
.who-b{font-family:"JetBrains Mono",monospace;font-size:11px;text-align:right;color:var(--fog)}
.who-b i{display:block;font-style:normal;font-size:9px;letter-spacing:.08em;text-transform:uppercase;opacity:.75}
.who-b.pos{color:var(--moss)}
.who-b.neg{color:var(--rust)}
/* elenco viaggi, riusa la riga .who */
.trip-row .who-n{cursor:pointer}
.trip-when{display:block;font-weight:400;color:var(--fog);font-size:10.5px;margin-top:2px}
.add-row{display:flex;gap:6px}
.add-row .field{flex:1;font-size:13px;padding:8px 10px}
.exp{padding:8px 0;border-bottom:1px solid var(--ink-3)}
.exp:last-of-type{border-bottom:0}
.exp-top{display:flex;align-items:baseline;gap:8px}
.exp-d{flex:1;font-size:13.5px;font-weight:600}
.exp-a{font-size:12.5px;font-weight:600;color:var(--ochre)}
.exp-m{color:var(--fog);margin-top:2px;font-size:10px}
.settle{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--ink-3);font-size:13px}
.settle:last-child{border-bottom:0}
.settle span{margin-left:auto;color:var(--ochre);font-weight:600}
.who-picks{display:flex;flex-wrap:wrap;gap:5px}
.who-pick{
  border:1px solid var(--ink-3);border-radius:999px;padding:6px 11px;font-size:12.5px;
  background:var(--ink-2);color:var(--fog)
}
.who-pick.on{background:var(--moss);border-color:var(--moss);color:#0E1A22;font-weight:600}
.pick-row{display:flex;gap:6px;margin-top:8px}
.link-row{display:flex;gap:6px;margin-bottom:6px}
.link-row .field{font-size:13px}
.link-row .field.lab{flex:0 0 34%}
.sheet-actions{display:flex;gap:8px;margin-top:18px}
.danger{color:var(--rust);border:1px solid rgba(184,73,44,.4);border-radius:var(--r);padding:11px 13px;font-weight:600;font-size:13.5px}
.danger:hover{background:rgba(184,73,44,.12)}

/* ---------- marker ---------- */
.leaflet-marker-icon{position:absolute}
.pin{
  width:32px;height:32px;border-radius:50% 50% 50% 3px;transform:rotate(-45deg);
  display:grid;place-items:center;border:2px solid rgba(255,255,255,.9);
  box-shadow:0 3px 9px rgba(0,0,0,.38);
}
.pin svg{width:17px;height:17px;transform:rotate(45deg);fill:#0E1A22}
.pin-n{
  position:absolute;top:-5px;right:-5px;min-width:17px;height:17px;padding:0 3px;
  border-radius:9px;background:var(--ink);color:var(--paper);border:1.5px solid rgba(255,255,255,.85);
  font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:600;
  display:grid;place-items:center;box-shadow:0 2px 5px rgba(0,0,0,.3)
}
.leaflet-popup-content-wrapper{border-radius:12px;font-family:"Public Sans",sans-serif}
.leaflet-popup-content{margin:12px 14px;font-size:13.5px;line-height:1.45}
.pop-k{display:block;font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:#7d8b95;margin-bottom:2px}
.pop-t{font-weight:700;font-size:15px;display:block;margin-bottom:3px}
.pop-n{display:block;color:#4a5b66;white-space:pre-wrap;margin-top:4px}
.pop-l{display:block;margin-top:6px;color:#0b5d8a}
.pop-b{
  display:block;margin-top:10px;padding-top:9px;border-top:1px solid #dfe4e8;
  font-weight:600;color:#12202B;text-decoration:none
}
.pop-b:hover{text-decoration:underline}

/* ---------- barra di comando ---------- */
/* Ancorata in basso a sinistra, fuori dal pannello: non lo copre e non sparisce
   quando il pannello si ritira. Due righe: viste sopra, azioni sotto. */
.bar{
  position:fixed;z-index:1600;bottom:0;left:0;width:390px;
  display:flex;flex-direction:column;gap:7px;padding:10px 16px 14px;
  background:linear-gradient(to top,var(--ink) 72%,rgba(18,32,43,0));
  transition:width .26s cubic-bezier(.3,.8,.4,1)
}
.tabs{display:flex;gap:3px;background:var(--ink-2);border:1px solid var(--ink-3);border-radius:999px;padding:3px}
.tabs button{flex:1;padding:8px 4px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--fog);white-space:nowrap}
.tabs button.on{background:var(--paper);color:var(--ink)}
.tabs button:hover:not(.on){color:var(--paper)}
.bar-acts{display:flex;gap:7px}
.act{
  flex:1;border-radius:var(--r);padding:10px;font-weight:600;font-size:13px;text-align:center;
  background:var(--paper);color:var(--ink);white-space:nowrap
}
.act.ghost{flex:0 0 46px;background:var(--ink-2);color:var(--paper);border:1px solid var(--ink-3);font-size:15px}
.act.ghost:hover{border-color:var(--fog)}
/* lo scorrimento finisce sopra la barra, così l'ultima tappa non ci va sotto */
.scroll{padding-bottom:118px}
@media (min-width:881px){
  /* in vista Mappa il pannello resta ma si accorcia: mostra intestazione,
     strumenti e ricerca, lasciando libera la mappa sotto */
  body.map-view .panel{
    align-self:start;max-height:none;border-radius:0 0 16px 0;
    border-bottom:1px solid var(--ink-3)
  }
  body.map-view .scroll{display:none}
  .bar{background:none}
  .tabs, .bar-acts{
    background:rgba(18,32,43,.94);border-radius:999px;
    box-shadow:0 8px 24px rgba(0,0,0,.45)
  }
  .bar-acts{padding:4px;border-radius:14px}
}
@media (max-width:880px){
  .app{grid-template-columns:1fr;grid-template-rows:1fr}
  #map{grid-area:1/1}
  .panel{grid-area:1/1;transform:translateY(100%);transition:transform .28s cubic-bezier(.3,.8,.4,1);border-right:0;border-top:1px solid var(--ink-3);border-radius:16px 16px 0 0}
  body.panel-open .panel{transform:translateY(0)}
  /* in vista Mappa il pannello si ancora in alto e mostra solo i comandi */
  body.map-view .panel{
    align-self:start;transform:none;border-radius:0 0 16px 16px;
    border-top:0;border-bottom:1px solid var(--ink-3)
  }
  body.map-view .scroll{display:none}
  .bar{width:100%}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div class="app">
  <aside class="panel">
    <div class="head">
      <div class="eyebrow-row">
        <span class="eyebrow">Itinerario</span>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="icon-btn" id="btnTrips" title="I tuoi viaggi" style="font-size:14px">🗂</button>
          <span id="saveState" class="save-state mono"></span>
          <span class="save-state mono" style="opacity:.5" id="verTag"></span>
        </div>
      </div>
      <input id="tripTitle" placeholder="Nome del viaggio" autocomplete="off">
      <div class="head-row" id="mapTools">
        <button class="chip" id="btnFit">Inquadra tutto</button>
        <button class="chip on" id="btnLabs" title="Mostra o nascondi i nomi sulla mappa">Nomi</button>
      </div>
    </div>

    <div class="search" id="searchBox">
      <div class="search-label mono">Aggiungi una tappa</div>
      <input id="q" placeholder="Cerca un luogo…" autocomplete="off">
      <div class="results" id="results" hidden></div>
      <button class="chip" id="btnPickInline" style="margin-top:8px;width:100%;justify-content:center">✛ Oppure tocca la mappa</button>
    </div>

    <div class="scroll" id="list"></div>
    <div class="scroll" id="costs" hidden></div>
    <div class="scroll" id="books" hidden></div>
    <div class="scroll" id="calBox" hidden></div>
  </aside>
  <div id="map"></div>
</div>

<!-- barra fissa: sempre visibile, in tutte e tre le viste -->
<div class="bar">
  <div class="tabs">
    <button id="tabMap">Mappa</button>
    <button id="tabList" class="on">Itinerario</button>
    <button id="tabCost">Spese</button>
    <button id="tabBook">Prenot.</button>
    <button id="tabCal" title="Calendario">📅</button>
  </div>
  <div class="bar-acts">
    <button class="act" id="btnDay" title="Aggiungi un giorno">＋ Giorno</button>
    <button class="act" id="btnExpense" title="Registra una spesa" hidden>＋ Spesa</button>
    <button class="act" id="btnBooking" title="Aggiungi una prenotazione" hidden>＋ Prenotazione</button>
    <button class="act ghost" id="btnExport" title="Scarica il file del viaggio">↓</button>
    <button class="act ghost" id="btnImport" title="Apri un file salvato">↑</button>
    <button class="act ghost install" id="btnInstall" hidden title="Installa Rotta sul dispositivo">⤓</button>
    <input type="file" id="file" accept="application/json" hidden>
  </div>
</div>

<div class="veil" id="veil" hidden>
  <div class="sheet" role="dialog" aria-modal="true">
    <h2 id="shTitle">Tappa</h2>
    <label for="fName">Nome</label>
    <input class="field" id="fName" autocomplete="off">
    <label>Tipo di tappa</label>
    <div class="type-grid" id="fType"></div>
    <label for="fDay">Giorno</label>
    <select class="field" id="fDay"></select>
    <label>Percorso</label>
    <button class="toggle" id="fChain" type="button">
      <span class="tick">✓</span>
      <span><b>Tappa in sequenza</b><span class="info-btn" tabindex="0" data-info="Numerata e collegata dal percorso. Spenta: pin libero del giorno">ⓘ</span></span>
    </button>
    <label>Spostamenti</label>
    <button class="toggle" id="fCity" type="button">
      <span class="tick">✓</span>
      <span><b>Tappa cittadina</b><span class="info-btn" tabindex="0" data-info="Quando due tappe consecutive sono entrambe segnate come cittadine, il tragitto tra loro viene calcolato a piedi invece che in auto. Attivalo su tutte le tappe che visiti camminando all'interno dello stesso centro urbano.">ⓘ</span></span>
    </button>
    <label>Contrassegni</label>
    <button class="toggle" id="fRain" type="button">
      <span class="tick">✓</span>
      <span><b>Adatta con meteo avverso</b><span class="info-btn" tabindex="0" data-info="Segnala che questa tappa resta piacevole anche con pioggia o maltempo — un museo, un edificio interno, un'attrazione al coperto. Aiuta a riconoscere a colpo d'occhio le tappe su cui contare se il tempo cambia.">ⓘ</span></span>
    </button>
    <button class="toggle" id="fKid" type="button">
      <span class="tick">✓</span>
      <span><b>Adatta con bimbo</b><span class="info-btn" tabindex="0" data-info="Segnala che la tappa è pensata per una famiglia con bambini piccoli: percorso accessibile con passeggino o comodo da affrontare con un bimbo in braccio o nello zaino, attività particolarmente divertente o coinvolgente per i più piccoli, oppure luogo al chiuso dove il meteo non è un problema.">ⓘ</span></span>
    </button>
    <button class="toggle" id="fAlt" type="button">
      <span class="tick">✓</span>
      <span><b>Tappa alternativa</b><span class="info-btn" tabindex="0" data-info="Le tappe alternative non fanno parte del percorso principale del giorno: non vengono numerate né collegate dal tragitto, restano sul posto come opzione di riserva pronta a subentrare in caso di meteo avverso o di altri imprevisti — chiusure, code, cambi di programma dell'ultimo minuto.">ⓘ</span></span>
    </button>
    <label>Immagine <span class="info-btn" tabindex="0" data-info="Puoi aggiungere una foto rappresentativa della tappa in due modi: caricandola dal telefono o dal computer, oppure incollando il link di un'immagine già pubblicata online.">ⓘ</span></label>
    <div class="img-row">
      <input class="field" id="fImg" placeholder="Incolla il link di un'immagine…" autocomplete="off">
      <button class="act ghost" id="fImgPick" type="button" title="Scegli dal dispositivo">📁</button>
      <button class="act ghost" id="fImgClear" type="button" title="Rimuovi">✕</button>
      <input type="file" id="fImgFile" accept="image/*" hidden>
    </div>
    <div id="fImgPrev"></div>
    <label for="fNote">Note</label>
    <textarea class="field" id="fNote" placeholder="Orari, prezzi, cosa vedere, promemoria…"></textarea>
    <label>Link <span class="info-btn" tabindex="0" data-info="Aggiungi uno o più collegamenti utili per questa tappa: il sito ufficiale dell'attrazione, la pagina di prenotazione, un articolo di approfondimento o qualunque altra pagina web pertinente.">ⓘ</span></label>
    <div id="fLinks"></div>
    <button class="chip" id="addLink" style="margin-top:6px">＋ Link</button>
    <label>Coordinate</label>
    <div class="mono" id="fCoord" style="color:var(--fog)"></div>
    <button class="toggle" id="fMove" type="button" style="margin-top:7px">
      <span class="tick">✛</span>
      <span><b>Sposta sulla mappa</b><span class="info-btn" tabindex="0" data-info="Chiude la scheda: il tocco successivo sposta qui la tappa">ⓘ</span></span>
    </button>
    <div class="sheet-actions">
      <button class="btn" id="save">Salva</button>
      <button class="btn ghost" id="cancel">Annulla</button>
      <button class="danger" id="del">Elimina</button>
    </div>
  </div>
</div>

<div class="veil" id="vwVeil" hidden>
  <div class="viewer" role="dialog" aria-modal="true">
    <div class="vw-head">
      <span id="vwName">Allegato</span>
      <a class="vw-btn" id="vwDownload" href="#" download title="Scarica">↓</a>
      <button class="vw-btn" id="vwClose" title="Chiudi">✕</button>
    </div>
    <div class="vw-body" id="vwBody"></div>
  </div>
</div>

<div id="updateBar" hidden>
  Nuova versione disponibile
  <button id="updateNow">Aggiorna</button>
  <button id="updateDismiss" title="Ignora">✕</button>
</div>

<div id="infoPop" class="info-pop" hidden></div>

<div id="syncBar" hidden>
  Il viaggio è stato aggiornato dall'altro dispositivo
  <button id="syncReload">Ricarica</button>
  <button id="syncDismiss" title="Ignora">✕</button>
</div>

<div class="veil" id="wxVeil" hidden>
  <div class="sheet" role="dialog" aria-modal="true">
    <h2 id="wxTitle">Meteo</h2>
    <div id="wxBody"></div>
    <div class="sheet-actions">
      <button class="btn ghost" id="wxClose" style="flex:1">Chiudi</button>
    </div>
  </div>
</div>

<div class="veil" id="tripsVeil" hidden>
  <div class="sheet" role="dialog" aria-modal="true">
    <h2>I tuoi viaggi</h2>
    <div id="tripsList"></div>
    <div class="sheet-actions">
      <button class="btn" id="btnNewTrip">＋ Nuovo viaggio</button>
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" id="btnShareTrip" style="flex:1">🔗 Condividi questo viaggio</button>
      <button class="btn ghost" id="btnJoinTrip" style="flex:1">＋ Unisciti con un codice</button>
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" id="tripsClose" style="flex:1">Chiudi</button>
    </div>
  </div>
</div>

<div class="veil" id="bVeil" hidden>
  <div class="sheet" role="dialog" aria-modal="true">
    <h2 id="bSheetT">Nuova prenotazione</h2>
    <label>Tipo</label>
    <div class="type-grid" id="bType"></div>
    <label for="bTitle">Titolo</label>
    <input class="field" id="bTitle" placeholder="Es. Volo Roma–Edimburgo, B&amp;B Fort William…" autocomplete="off">
    <label for="bWho">Fornitore o compagnia</label>
    <input class="field" id="bWho" placeholder="Ryanair, ScotRail, Booking…" autocomplete="off">

    <label id="bALab">Partenza</label>
    <div class="img-row">
      <input class="field" id="bAWhen" type="datetime-local">
    </div>
    <input class="field" id="bAPlace" placeholder="Luogo" autocomplete="off" style="margin-top:6px">

    <div id="bLegB">
      <label id="bBLab">Arrivo</label>
      <div class="img-row">
        <input class="field" id="bBWhen" type="datetime-local">
      </div>
      <input class="field" id="bBPlace" placeholder="Luogo" autocomplete="off" style="margin-top:6px">
    </div>

    <label id="bRefLab">Codice prenotazione</label>
    <input class="field" id="bRef" placeholder="Es. XK7P2Q" autocomplete="off">

    <label for="bCost">Costo</label>
    <input class="field" id="bCost" type="text" inputmode="decimal" placeholder="0,00">

    <label>Cancellazione</label>
    <div class="who-picks" id="bRefund">
      <button class="who-pick on" data-v="free">Gratuita</button>
      <button class="who-pick" data-v="paid">Non rimborsabile</button>
      <button class="who-pick" data-v="unknown">Da verificare</button>
    </div>
    <div id="bFreeRow">
      <label for="bFreeUntil">Gratuita fino al</label>
      <input class="field" id="bFreeUntil" type="date">
    </div>

    <label>Allegato</label>

     vuoto più sotto, questi script restano semplicemente inutilizzati. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
/* ============ stato ============ */
const APP_VERSION = 'v8';
(() => {
  const v = document.getElementById('verTag');
  if(v) v.textContent = APP_VERSION;
  /* La barra di aggiornamento parte SEMPRE nascosta e viene mostrata solo dalla
     logica del service worker. Il gestore della ✕ è collegato qui, all'inizio
     dello script, così funziona anche se qualcosa si rompesse più avanti. */
  const bar = document.getElementById('updateBar');
  const dis = document.getElementById('updateDismiss');
  if(bar) bar.hidden = true;
  if(dis) dis.onclick = () => { if(bar) bar.hidden = true; };
})();
const PALETTE = ['#E0A32E','#4C9BB0','#8B6BB1','#4C7A5A','#B8492C','#5A78C4','#C2557E','#7E8B99'];
/* Da v7 l'app tiene più viaggi: ognuno vive sotto la propria chiave 'rotta:trip:<id>'
   nello stesso object store 'kv' di sempre (nessun bump di versione IndexedDB).
   'rotta:v1' è la vecchia chiave a viaggio singolo: resta lì solo per la migrazione
   al primo avvio dopo l'aggiornamento, non viene più scritta. */
const LEGACY_KEY = 'rotta:v1';
const INDEX_KEY = 'rotta:index';
const ACTIVE_KEY = 'rotta:active';
const tripKey = id => 'rotta:trip:' + id;
let state = null, pickMode = false, editing = null, moving = null;
let tripIndex = [];
const routeCache = new Map();

const uid = () => Math.random().toString(36).slice(2,9);
const fresh = () => ({
  id: uid(),
  title:'Il mio viaggio',
  days:[{id:uid(), name:'Giorno 1', color:PALETTE[0]}],
  places:[],
  people:[],
  expenses:[],
  currency:'€',
  view:{lat:45.0, lng:9.0, z:5}
});

/* ============ mappa ============ */
const map = L.map('map',{zoomControl:false}).setView([45,9],5);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  maxZoom:19, attribution:'© OpenStreetMap · © CARTO'
}).addTo(map);
const layer = L.layerGroup().addTo(map);

map.on('click', e => {
  /* modalità spostamento: riposiziona la tappa aperta e torna alla scheda */
  if(moving){
    const p = state.places.find(x => x.id === moving);
    moving = null;
    document.body.classList.remove('moving');
    if(p){
      p.lat = e.latlng.lat; p.lng = e.latlng.lng;
      save(); render(); edit(p.id);
    }
    return;
  }
  if(!pickMode) return;
  setPick(false);
  addPlace({name:'Nuova tappa', lat:e.latlng.lat, lng:e.latlng.lng}, true);
});
map.on('moveend', () => { state.view = {lat:map.getCenter().lat, lng:map.getCenter().lng, z:map.getZoom()}; save(); });

/* ============ persistenza ============ */
/* IndexedDB sul dispositivo: i dati restano qui anche chiudendo l'app e non
   dipendono da servizi esterni. Regge decine di MB, quindi foto e PDF delle
   prenotazioni non sono un problema. */
let t = null, dirty = false, storageOK = null, db = null;

function openDB(){
  return new Promise((res, rej) => {
    const r = indexedDB.open('rotta', 1);
    r.onupgradeneeded = () => { r.result.createObjectStore('kv'); };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
function dbGet(k){
  return new Promise((res, rej) => {
    const q = db.transaction('kv','readonly').objectStore('kv').get(k);
    q.onsuccess = () => res(q.result);
    q.onerror = () => rej(q.error);
  });
}
function dbSet(k, v){
  return new Promise((res, rej) => {
    const q = db.transaction('kv','readwrite').objectStore('kv').put(v, k);
    q.onsuccess = () => res(true);
    q.onerror = () => rej(q.error);
  });
}
function dbDel(k){
  return new Promise((res, rej) => {
    const q = db.transaction('kv','readwrite').objectStore('kv').delete(k);
    q.onsuccess = () => res(true);
    q.onerror = () => rej(q.error);
  });
}

/* aggiorna (o crea) la voce di un viaggio nell'elenco leggero rotta:index,
   usato dalla sheet "I tuoi viaggi" senza dover caricare ogni viaggio intero */
async function touchIndex(id, title, updatedAt){
  const idx = (await dbGet(INDEX_KEY)) || [];
  const row = idx.find(t => t.id === id);
  if(row){ row.title = title || 'Il mio viaggio'; row.updatedAt = updatedAt; }
  else idx.unshift({id, title: title || 'Il mio viaggio', updatedAt});
  await dbSet(INDEX_KEY, idx);
  tripIndex = idx;
}

function badge(mode){
  const el = document.getElementById('saveState');
  if(!el) return;
  const map_ = {
    saved:   ['Salvato',           'ok'],
    saving:  ['Salvo…',            ''],
    unsaved: ['Non salvato',       'warn'],
    off:     ['Salva tu il file',  'warn']
  };
  const [txt, cls] = map_[mode];
  el.textContent = txt;
  el.className = 'save-state mono ' + cls;
}

function save(){
  dirty = true;
  badge(storageOK === false ? 'off' : 'saving');
  clearTimeout(t);
  t = setTimeout(write, 400);
}

async function write(){
  if(!db){ storageOK = false; badge('off'); return; }
  try{
    /* structuredClone implicito: salvo l'oggetto, non una stringa */
    await dbSet(tripKey(state.id), JSON.parse(JSON.stringify(state)));
    await touchIndex(state.id, state.title, Date.now());
    storageOK = true; dirty = false; badge('saved');
  }catch(e){
    console.warn('salvataggio non riuscito:', e && e.message);
    storageOK = false;
    badge('off');
    return;
  }
  /* la sincronizzazione cloud va in background e non deve mai rallentare né
     bloccare il salvataggio locale, che resta sempre la fonte di verità */
  if(state.shareId) pushToCloud(state);
}

async function boot(){
  await initSync();
  try{
    db = await openDB();
    tripIndex = (await dbGet(INDEX_KEY)) || [];
    if(tripIndex.length){
      const activeId = await dbGet(ACTIVE_KEY);
      const wanted = tripIndex.some(t => t.id === activeId) ? activeId : tripIndex[0].id;
      const loaded = await dbGet(tripKey(wanted));
      if(loaded && loaded.days){ state = loaded; storageOK = true; }
    } else {
      /* nessun indice: o è il primissimo avvio, o l'app veniva da prima di v7
         con un solo viaggio salvato sotto la vecchia chiave fissa */
      const legacy = await dbGet(LEGACY_KEY);
      if(legacy && legacy.days){
        legacy.id = legacy.id || uid();
        state = legacy; storageOK = true;
        await dbSet(tripKey(state.id), state);
        await touchIndex(state.id, state.title, Date.now());
        await dbSet(ACTIVE_KEY, state.id);
      }
    }
  }catch(e){ console.warn('IndexedDB non disponibile:', e && e.message); }
  if(!state || !state.days){
    state = fresh();
    if(db){
      try{
        await dbSet(tripKey(state.id), state);
        await touchIndex(state.id, state.title, Date.now());
        await dbSet(ACTIVE_KEY, state.id);
        storageOK = true;
      }catch(e){}
    }
  }
  normalize();
  document.getElementById('tripTitle').value = state.title || '';
  if(state.view) map.setView([state.view.lat, state.view.lng], state.view.z);
  badge(storageOK ? 'saved' : 'unsaved');
  render();
  setView('list');
  subscribeShared(state.shareId);
}

/* ============ più viaggi ============ */
function closeTripsSheet(){ document.getElementById('tripsVeil').hidden = true; }

async function switchTrip(id, opts){
  opts = opts || {};
  if(!db || id === state.id){ if(opts.close !== false) closeTripsSheet(); return; }
  const loaded = await dbGet(tripKey(id));
  if(!loaded || !loaded.days) return;
  state = loaded;
  normalize();
  await dbSet(ACTIVE_KEY, id);
  document.getElementById('tripTitle').value = state.title || '';
  if(state.view) map.setView([state.view.lat, state.view.lng], state.view.z);
  render();
  if(view === 'cost') drawCosts();
  if(view === 'book') drawBooks();
  badge(storageOK ? 'saved' : 'unsaved');
  if(opts.close !== false) closeTripsSheet();
  subscribeShared(state.shareId);
}

async function newTrip(opts){
  opts = opts || {};
  const t = fresh();
  state = t;
  tripIndex.unshift({id:t.id, title:t.title, updatedAt:Date.now()});
  if(db){
    await dbSet(tripKey(t.id), t);
    await dbSet(INDEX_KEY, tripIndex);
    await dbSet(ACTIVE_KEY, t.id);
    storageOK = true;
  }
  document.getElementById('tripTitle').value = t.title;
  map.setView([t.view.lat, t.view.lng], t.view.z);
  render();
  badge(storageOK ? 'saved' : 'unsaved');
  if(opts.close !== false){
    closeTripsSheet();
    const ti = document.getElementById('tripTitle');
    ti.focus(); ti.select();
  } else {
    drawTrips();
  }
  subscribeShared(null);
}

async function deleteTrip(id){
  const row = tripIndex.find(t => t.id === id);
  if(!row) return;
  if(!confirm('Eliminare "'+(row.title||'questo viaggio')+'"? Non si può annullare.')) return;
  await dbDel(tripKey(id));
  tripIndex = tripIndex.filter(t => t.id !== id);
  await dbSet(INDEX_KEY, tripIndex);
  if(id === state.id){
    if(tripIndex.length) await switchTrip(tripIndex[0].id, {close:false});
    else await newTrip({close:false});
  }
  drawTrips();
}

function fmtTripDate(ts){
  if(!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('it-IT') + ' · ' + d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
}

function drawTrips(){
  const box = document.getElementById('tripsList');
  const sorted = tripIndex.slice().sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
  box.innerHTML = sorted.map(t => (
    '<div class="who trip-row">'+
      '<span class="who-n" data-open="'+t.id+'">'+esc(t.title||'Senza nome')+
        (t.id===state.id ? ' <b style="color:var(--moss);font-weight:600">· attivo</b>' : '')+
        '<i class="trip-when mono">'+fmtTripDate(t.updatedAt)+'</i></span>'+
      '<button class="icon-btn" data-del="'+t.id+'" title="Elimina">✕</button>'+
    '</div>'
  )).join('') || '<p class="empty" style="padding:0">Nessun viaggio.</p>';
  box.querySelectorAll('[data-open]').forEach(el => el.onclick = () => switchTrip(el.dataset.open));
  box.querySelectorAll('[data-del]').forEach(el => el.onclick = e => { e.stopPropagation(); deleteTrip(el.dataset.del); });
}

document.getElementById('btnShareTrip').onclick = shareTrip;

/* ============ sincronizzazione condivisa (Firebase) ============ */
/* Incolla qui la configurazione del tuo progetto Firebase (Impostazioni progetto
   -> app Web). Questi valori non sono segreti: la sicurezza sta nelle regole di
   Firestore/Storage, non nel nasconderli. Finché resta null la condivisione tra
   dispositivi è disattivata e il resto dell'app funziona comunque normalmente. */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCMz086qcSzyYJht5bg7YtypC8uacW35Qw",
  authDomain: "family-trip-9848d.firebaseapp.com",
  projectId: "family-trip-9848d",
  storageBucket: "family-trip-9848d.firebasestorage.app",
  messagingSenderId: "922655367741",
  appId: "1:922655367741:web:65a5df6fb87835d39f4054"
};

/* identifica questo browser/installazione, per riconoscere i propri stessi
   salvataggi quando tornano indietro dall'ascolto in tempo reale */
const DEVICE_ID = (() => {
  let d = localStorage.getItem('rotta:device');
  if(!d){ d = uid()+uid(); localStorage.setItem('rotta:device', d); }
  return d;
})();

let fbDb = null, fbStorage = null, fbReady = false, unsubShare = null, pendingRemote = null;

async function initSync(){
  if(!FIREBASE_CONFIG || typeof firebase === 'undefined') return;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    await firebase.auth().signInAnonymously();
    fbDb = firebase.firestore();
    fbStorage = firebase.storage();
    fbReady = true;
  }catch(e){ console.warn('sincronizzazione non disponibile:', e && e.message); }
}

function dataURLtoBlob(dataUrl){
  const [head, b64] = dataUrl.split(',');
  const mime = (head.match(/data:([^;]+)/) || [])[1] || 'application/octet-stream';
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], {type: mime});
}
function urlToDataURL(url){
  return fetch(url).then(r => r.blob()).then(blob => new Promise((res, rej) => {
    const rd = new FileReader();
    rd.onload = () => res(rd.result);
    rd.onerror = rej;
    rd.readAsDataURL(blob);
  }));
}

/* Carica su Firebase Storage gli allegati ancora locali (base64) di un viaggio
   condiviso, e riusa il link già caricato se il contenuto non è cambiato dall'ultimo
   invio: altrimenti ogni salvataggio ricaricherebbe le stesse foto inutilmente. */
async function cloudizeAttachments(tripState){
  const jobs = [];
  const swap = (obj, field, urlField, path) => {
    const v = obj[field];
    if(!v || !/^data:/.test(v)){
      if(obj[urlField]){ delete obj[urlField]; delete obj[urlField+'Src']; }
      return;
    }
    if(obj[urlField+'Src'] === v && obj[urlField]) return;
    jobs.push((async () => {
      const ref = fbStorage.ref('trips/'+tripState.shareId+'/'+path);
      await ref.put(dataURLtoBlob(v));
      obj[urlField] = await ref.getDownloadURL();
      obj[urlField+'Src'] = v;
    })());
  };
  (tripState.places||[]).forEach(p => swap(p, 'img', 'imgUrl', 'place-'+p.id));
  (tripState.bookings||[]).forEach(b => swap(b, 'file', 'fileUrl', 'book-'+b.id));
  await Promise.all(jobs);
}

/* Il documento Firestore porta gli URL degli allegati, mai il base64: una sola
   foto supererebbe il limite di 1MB per documento. */
function cloudPayload(tripState){
  const places = (tripState.places||[]).map(p => {
    const c = {...p};
    if(c.imgUrl) c.img = c.imgUrl;
    delete c.imgUrl; delete c.imgUrlSrc;
    return c;
  });
  const bookings = (tripState.bookings||[]).map(b => {
    const c = {...b};
    if(c.fileUrl) c.file = c.fileUrl;
    delete c.fileUrl; delete c.fileUrlSrc;
    return c;
  });
  return {...tripState, places, bookings};
}

async function pushToCloud(tripState){
  if(!fbReady || !tripState.shareId || !navigator.onLine) return;
  try{
    await cloudizeAttachments(tripState);
    await dbSet(tripKey(tripState.id), JSON.parse(JSON.stringify(tripState))); // gli URL calcolati restano anche in locale
    await fbDb.collection('trips').doc(tripState.shareId).set({
      ...cloudPayload(tripState),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      deviceId: DEVICE_ID
    });
  }catch(e){ console.warn('sincronizzazione non riuscita:', e && e.message); }
}

/* riporta gli allegati da URL remoto a base64 locale, così restano visibili anche offline */
async function localizeAttachments(tripState){
  const jobs = [];
  const pull = (obj, field) => {
    const v = obj[field];
    if(!v || !/^https?:/.test(v)) return;
    jobs.push(urlToDataURL(v).then(d => { obj[field] = d; }).catch(() => {}));
  };
  (tripState.places||[]).forEach(p => pull(p, 'img'));
  (tripState.bookings||[]).forEach(b => pull(b, 'file'));
  await Promise.all(jobs);
}

function showSyncBar(){ const b = document.getElementById('syncBar'); if(b) b.hidden = false; }
function hideSyncBar(){ const b = document.getElementById('syncBar'); if(b) b.hidden = true; }

function subscribeShared(shareId){
  if(unsubShare){ unsubShare(); unsubShare = null; }
  hideSyncBar(); pendingRemote = null;
  if(!fbReady || !shareId) return;
  unsubShare = fbDb.collection('trips').doc(shareId).onSnapshot(snap => {
    if(!snap.exists || snap.metadata.hasPendingWrites) return;
    const data = snap.data();
    if(data.deviceId === DEVICE_ID) return; // è il proprio salvataggio che torna indietro
    if(!data.updatedAt || data.updatedAt.toMillis() <= (state.cloudAt || 0)) return;
    pendingRemote = data;
    showSyncBar();
  });
}

document.getElementById('syncReload').onclick = async () => {
  if(!pendingRemote){ hideSyncBar(); return; }
  hideSyncBar();
  const incoming = {...pendingRemote};
  delete incoming.updatedAt; delete incoming.deviceId;
  incoming.id = state.id;
  incoming.cloudAt = Date.now();
  await localizeAttachments(incoming);
  state = incoming;
  normalize();
  await dbSet(tripKey(state.id), state);
  await touchIndex(state.id, state.title, Date.now());
  document.getElementById('tripTitle').value = state.title || '';
  render();
  if(view === 'cost') drawCosts();
  if(view === 'book') drawBooks();
  pendingRemote = null;
};
document.getElementById('syncDismiss').onclick = hideSyncBar;

async function shareTrip(){
  if(!fbReady){ alert('La condivisione non è ancora configurata su questa app.'); return; }
  if(!state.shareId){
    state.shareId = fbDb.collection('trips').doc().id;
    await write();
  }
  subscribeShared(state.shareId);
  prompt('Comunica questo codice alla tua compagna (lo inserirà con "Unisciti con un codice"):', state.shareId);
}

async function joinTrip(code){
  if(!fbReady){ alert('La condivisione non è ancora configurata su questa app.'); return; }
  code = (code||'').trim();
  if(!code) return;
  const snap = await fbDb.collection('trips').doc(code).get();
  if(!snap.exists){ alert('Nessun viaggio condiviso trovato con questo codice.'); return; }
  const data = snap.data();
  delete data.updatedAt; delete data.deviceId;
  data.id = uid();
  data.shareId = code;
  data.cloudAt = Date.now();
  await localizeAttachments(data);
  state = data;
  normalize();
  tripIndex.unshift({id:state.id, title:state.title, updatedAt:Date.now()});
  await dbSet(tripKey(state.id), state);
  await dbSet(INDEX_KEY, tripIndex);
  await dbSet(ACTIVE_KEY, state.id);
  document.getElementById('tripTitle').value = state.title || '';
  render();
  closeTripsSheet();
  subscribeShared(state.shareId);
}

/* avviso se esci con modifiche non salvate su disco */
window.addEventListener('beforeunload', e => {
  if(dirty && storageOK !== true && state && state.places.length){
    e.preventDefault();
    e.returnValue = '';
  }
});

/* ============ tipi di tappa ============ */
/* ogni glifo è un path 24x24, disegnato in bianco sopra il colore del giorno */

/* tipi che sono segnaposto di servizio: non entrano mai nel percorso numerato */
const POI = {food:1, sleep:1, shop:1, transit:1};
const isPoi = p => !!POI[p.type||'place'];
/* una tappa entra nel percorso numerato solo se è "in catena".
   chain === false -> tappa libera del giorno: pin sulla mappa, nessun numero, nessun percorso.
   I file salvati prima di questa versione non hanno il campo: valgono come in catena. */
const inChain = p => p.chain !== false;
const offRoute = p => !!p.alt || isPoi(p) || !inChain(p);

/* ============ utilità ============ */
const km = (a,b) => {
  const R=6371, r=Math.PI/180;
  const dLat=(b.lat-a.lat)*r, dLng=(b.lng-a.lng)*r;
  const x=Math.sin(dLat/2)**2 + Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
};
const fmt = d => d < 1 ? Math.round(d*1000)+' m' : d.toFixed(1).replace('.',',')+' km';
const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
/* somma n giorni a una data 'YYYY-MM-DD', gestendo da sola i cambi di mese/anno */
function addDaysISO(iso, n){
  const [Y,M,D] = iso.split('-').map(Number);
  const d = new Date(Y, M-1, D + n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
const dayOf = id => state.days.find(d=>d.id===id);
const all = id => state.places.filter(p=>p.dayId===id);
const stops = id => all(id).filter(p=>!offRoute(p));  // percorso numerato
const alts  = id => all(id).filter(p=>offRoute(p));   // alternative meteo + segnaposti

function addPlace(o, open){
  const p = {id:uid(), name:o.name, lat:o.lat, lng:o.lng, dayId:o.dayId ?? state.days[0]?.id ?? null, notes:'', links:[], type:o.type || 'place', rain:false, alt:false, city:false, chain:true};
  state.places.push(p); save(); render();
  if(open) edit(p.id);
  return p;
}

/* ============ ricerca ============ */
const qEl = document.getElementById('q'), resEl = document.getElementById('results');
let qt = null;
qEl.addEventListener('input', () => {
  clearTimeout(qt);
  const v = qEl.value.trim();
  if(v.length < 3){ resEl.hidden = true; return; }
  qt = setTimeout(() => find(v), 450);
});
qEl.addEventListener('blur', () => setTimeout(()=>resEl.hidden=true, 200));

async function find(v){
  resEl.hidden = false;
  resEl.innerHTML = '<div class="hint">Cerco…</div>';
  try{
    const b = map.getBounds();
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=6&accept-language=it&q='
      + encodeURIComponent(v) + '&viewbox=' + [b.getWest(),b.getNorth(),b.getEast(),b.getSouth()].join(',');
    const r = await fetch(url);
    const j = await r.json();
    if(!j.length){ resEl.innerHTML = '<div class="hint">Nessun risultato. Prova con il nome della città accanto, oppure tocca la mappa qui sotto.</div>'; return; }
    resEl.innerHTML = '';
    j.forEach(h => {
      const short = h.display_name.split(',')[0];
      const b2 = document.createElement('button');
      b2.innerHTML = esc(short) + '<span class="muted">' + esc(h.display_name.split(',').slice(1,4).join(',').trim()) + '</span>';
      b2.onclick = () => {
        resEl.hidden = true; qEl.value = '';
        const p = addPlace({name:short, lat:+h.lat, lng:+h.lon});
        map.flyTo([p.lat,p.lng], Math.max(map.getZoom(),13));
        edit(p.id);
      };
      resEl.appendChild(b2);
    });
  }catch(e){
    resEl.innerHTML = '<div class="hint">Ricerca non raggiungibile. Tocca la mappa qui sotto per aggiungere la tappa.</div>';
  }
}

/* ============ percorsi su strada ============ */
async function roadLine(list){
  const key = list.map(p=>p.lat.toFixed(4)+','+p.lng.toFixed(4)).join(';');
  if(routeCache.has(key)) return routeCache.get(key);
  try{
    const coords = list.map(p=>p.lng+','+p.lat).join(';');
    const r = await fetch('https://router.project-osrm.org/route/v1/driving/'+coords+'?overview=full&geometries=geojson');
    const j = await r.json();
    if(!j.routes || !j.routes[0]) throw 0;
    const out = {line:j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]), dist:j.routes[0].distance/1000};
    routeCache.set(key,out); return out;
  }catch(e){ routeCache.set(key,null); return null; }
}

/* ============ render ============ */
function render(){
  drawMap();
  drawList();
  refreshLegs();
  refreshWeather();
}

/* velocità di riserva, usate solo finché non arriva il dato reale */
const SPEED = {walking:4.5, driving:55};
/* Regola cittadina: si va a piedi solo se ENTRAMBI gli estremi sono tappe cittadine.
   Così la prima cittadina si raggiunge in auto, dentro il blocco ci si muove a piedi,
   e dall'ultima cittadina si riparte in auto verso una tappa fuori città. */
function legMode(a,b){ return (a.city && b.city) ? 'walking' : 'driving'; }
function dur(mins){
  mins = Math.max(1, Math.round(mins));
  if(mins < 60) return mins+' min';
  const h = Math.floor(mins/60), m = mins%60;
  return m ? h+'h'+String(m).padStart(2,'0') : h+' h';
}

/* tempi/distanze reali via OSRM (routing su rete stradale e pedonale OpenStreetMap).
   Google non consente chiamate dirette dal browser, quindi i numeri vengono da qui;
   il pulsante ➔ apre comunque il giorno su Google Maps per il dato definitivo. */
const legCache = new Map();
function legKey(a,b,m){ return m+':'+a.lat.toFixed(4)+','+a.lng.toFixed(4)+'>'+b.lat.toFixed(4)+','+b.lng.toFixed(4); }

function legTime(a,b){
  const mode = legMode(a,b);
  const hit = legCache.get(legKey(a,b,mode));
  /* Anche col dato reale, un tempo pedonale resta indicativo: nessun router gratuito
     tiene conto del dislivello, e con Francesco nello zaino va preso per difetto.
     Perciò le tratte a piedi restano sempre marcate come stima. */
  if(hit) return {mins:hit.mins, dist:hit.dist, mode, real: mode !== 'walking'};
  const dist = km(a,b) * (mode==='walking' ? 1.3 : 1.35);
  return {mins: dist / SPEED[mode] * 60, dist, mode, real:false};
}

async function fetchLeg(a,b){
  const mode = legMode(a,b), k = legKey(a,b,mode);
  if(legCache.has(k)) return legCache.get(k);
  /* Il server demo OSRM espone SOLO il profilo driving: una richiesta "foot" verrebbe
     servita lo stesso ma con tempi da automobile (13 min invece di 40 per Waverley →
     Arthur's Seat). Uso quindi la distanza stradale reale e ricalcolo la durata a
     velocità pedonale, senza fidarmi della durata restituita. */
  try{
    const r = await fetch('https://router.project-osrm.org/route/v1/driving/'
      + a.lng+','+a.lat+';'+b.lng+','+b.lat+'?overview=false');
    const j = await r.json();
    if(!j.routes || !j.routes[0]) throw 0;
    const distKm = j.routes[0].distance/1000;
    const out = mode === 'walking'
      ? {mins: distKm / SPEED.walking * 60, dist: distKm, walkCalc:true}
      : {mins: j.routes[0].duration/60, dist: distKm, walkCalc:false};
    legCache.set(k,out); return out;
  }catch(e){ legCache.set(k,null); return null; }
}

/* aggiorna in background tutte le tratte, poi ridisegna una sola volta */
let refreshing = false;
async function refreshLegs(){
  if(refreshing) return;
  refreshing = true;
  const jobs = [];
  state.days.forEach(d => {
    const l = stops(d.id);
    for(let i=1;i<l.length;i++){
      const a=l[i-1], b=l[i];
      if(!legCache.has(legKey(a,b,legMode(a,b)))) jobs.push([a,b]);
    }
  });
  if(jobs.length){
    for(const [a,b] of jobs) await fetchLeg(a,b);
    drawMap(); drawList();
  }
  refreshing = false;
}

/* ============ meteo per giorno (Open-Meteo, gratuito, senza chiave) ============ */
/* Codici WMO restituiti dall'API, ridotti a poche categorie utili. Verificato
   l'endpoint reale prima di scrivere questo codice: massimo 16 giorni di
   previsione affidabile (forecast_days), timezone=auto rileva il fuso dalle
   coordinate (utile per mete fuori Italia). */
const WX_STALE_MS = 6*3600*1000;
function wmoCategory(code){
  if(code === 0) return {icon:'☀️', label:'sereno'};
  if(code <= 3) return {icon:'⛅', label:'nuvoloso'};
  if(code === 45 || code === 48) return {icon:'🌫️', label:'nebbia'};
  if((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return {icon:'🌧️', label:'pioggia'};
  if((code >= 71 && code <= 77) || code === 85 || code === 86) return {icon:'❄️', label:'neve'};
  if(code >= 95) return {icon:'⛈️', label:'temporale'};
  return {icon:'🌡️', label:''};
}
const isRainy = code => (code >= 51 && code <= 67) || (code >= 80 && code <= 82) || code >= 95;

/* posizione da usare per il meteo del giorno: prima tappa in sequenza,
   altrimenti la media di tutte le tappe del giorno */
function dayCoord(d){
  const chain = stops(d.id);
  if(chain.length) return {lat:chain[0].lat, lng:chain[0].lng};
  const list = all(d.id);
  if(!list.length) return null;
  return {
    lat: list.reduce((s,p)=>s+p.lat,0)/list.length,
    lng: list.reduce((s,p)=>s+p.lng,0)/list.length
  };
}

async function fetchDayWeather(d){
  if(!d.date) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const daysAhead = Math.round((new Date(d.date+'T00:00:00') - today) / 86400000);
  if(daysAhead < 0 || daysAhead > 15) return null; // fuori dalla finestra affidabile di Open-Meteo
  const coord = dayCoord(d);
  if(!coord) return null;
  try{
    const url = 'https://api.open-meteo.com/v1/forecast?latitude='+coord.lat.toFixed(3)+'&longitude='+coord.lng.toFixed(3)
      + '&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto&forecast_days=16';
    const r = await fetch(url);
    const j = await r.json();
    const idx = j.daily && j.daily.time ? j.daily.time.indexOf(d.date) : -1;
    if(idx < 0) return null;
    return {
      fetchedAt: Date.now(), date: d.date,
      tmax: j.daily.temperature_2m_max[idx],
      tmin: j.daily.temperature_2m_min[idx],
      code: j.daily.weathercode[idx]
    };
  }catch(e){ return null; }
}

/* aggiorna il meteo di un giorno solo se mancante, scaduto (>6h) o riferito
   a una data diversa da quella attuale del giorno (l'utente l'ha cambiata) */
async function ensureWeather(d){
  const stale = !d.wx || d.wx.date !== d.date || (Date.now() - d.wx.fetchedAt) > WX_STALE_MS;
  if(!stale) return;
  const wx = await fetchDayWeather(d);
  if(wx){ d.wx = wx; save(); }
}

let wxRefreshing = false;
async function refreshWeather(){
  if(wxRefreshing) return;
  wxRefreshing = true;
  const targets = state.days.filter(d => d.date &&
    (!d.wx || d.wx.date !== d.date || Date.now() - d.wx.fetchedAt > WX_STALE_MS));
  if(targets.length){
    for(const d of targets) await ensureWeather(d);
    drawList();
    if(view === 'cal') drawCalendar();
  }
  wxRefreshing = false;
}

/* badge riusato sia nell'intestazione del giorno (vista Itinerario) sia nella
   tile della vista Calendario. È uno span cliccabile (non un <button>, perché
   nella tile del calendario finisce dentro un altro <button>: annidare due
   elementi interattivi non è valido HTML) con onclick inline che ferma la
   propagazione, per non far scattare anche l'azione della tile che lo contiene. */
function wxBadgeHTML(d){
  if(!d.date) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const daysAhead = Math.round((new Date(d.date+'T00:00:00') - today) / 86400000);
  if(daysAhead < 0 || daysAhead > 15) return '<span class="day-wx mono" title="Previsione non disponibile per una data così lontana">—</span>';
  if(!d.wx || d.wx.date !== d.date) return '<span class="day-wx mono">…</span>';
  const cat = wmoCategory(d.wx.code);
  /* se piove ed esistono già tappe "se piove" pronte per quel giorno, lo segnalo:
     è il collegamento pratico tra meteo e alternative, altrimenti solo teoriche */
  const rainReady = isRainy(d.wx.code) && alts(d.id).some(p => p.alt);
  return '<span class="day-wx tap mono'+(rainReady?' rain-ready':'')+'" title="'+esc(cat.label)+(rainReady?' · alternative pronte':'')+' · tocca per i dettagli" onclick="event.stopPropagation();openWeather(\''+d.id+'\')">'
    + cat.icon+' '+Math.round(d.wx.tmax)+'°/'+Math.round(d.wx.tmin)+'°'+(rainReady?' ☂':'')+'</span>';
}

/* ============ widget meteo dettagliato ============ */
/* Il badge mostra sempre la condizione peggiore della giornata (così Open-Meteo
   calcola il weathercode giornaliero: la più severa, non la più frequente —
   se piove anche solo un'ora compare pioggia). Qui invece il quadro completo:
   precipitazioni, vento, alba/tramonto e un andamento orario, richiesto solo
   quando l'utente apre il dettaglio, non a ogni salvataggio come il badge. */
async function fetchDayWeatherDetail(d){
  const today = new Date(); today.setHours(0,0,0,0);
  const daysAhead = Math.round((new Date(d.date+'T00:00:00') - today) / 86400000);
  if(daysAhead < 0 || daysAhead > 15) return null;
  const coord = dayCoord(d);
  if(!coord) return null;
  try{
    const url = 'https://api.open-meteo.com/v1/forecast?latitude='+coord.lat.toFixed(3)+'&longitude='+coord.lng.toFixed(3)
      + '&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_sum,precipitation_probability_max,windspeed_10m_max,sunrise,sunset'
      + '&hourly=temperature_2m,precipitation_probability,weathercode'
      + '&timezone=auto&start_date='+d.date+'&end_date='+d.date;
    const r = await fetch(url);
    const j = await r.json();
    if(!j.daily || !j.daily.time || !j.daily.time.length) return null;
    return {
      fetchedAt: Date.now(), date: d.date,
      tmax: j.daily.temperature_2m_max[0], tmin: j.daily.temperature_2m_min[0],
      code: j.daily.weathercode[0],
      precip: j.daily.precipitation_sum[0], precipProb: j.daily.precipitation_probability_max[0],
      wind: j.daily.windspeed_10m_max[0],
      sunrise: j.daily.sunrise[0], sunset: j.daily.sunset[0],
      hourly: (j.hourly && j.hourly.time || []).map((t,i) => ({
        h: t.slice(11,16), temp: j.hourly.temperature_2m[i],
        prob: j.hourly.precipitation_probability[i], code: j.hourly.weathercode[i]
      }))
    };
  }catch(e){ return null; }
}

async function ensureWeatherDetail(d){
  const stale = !d.wxDetail || d.wxDetail.date !== d.date || (Date.now() - d.wxDetail.fetchedAt) > WX_STALE_MS;
  if(stale){
    const detail = await fetchDayWeatherDetail(d);
    if(detail){ d.wxDetail = detail; save(); }
  }
  return d.wxDetail && d.wxDetail.date === d.date ? d.wxDetail : null;
}

function wxDetailHTML(w){
  const cat = wmoCategory(w.code);
  const fmtH = s => s ? s.slice(11,16) : '—';
  const hrs = w.hourly.filter((h,i) => i % 3 === 0);
  return '<div class="wx-main">'+
      '<span class="wx-ic">'+cat.icon+'</span>'+
      '<div><b>'+Math.round(w.tmax)+'° / '+Math.round(w.tmin)+'°</b><i>'+esc(cat.label)+'</i></div>'+
    '</div>'+
    '<div class="wx-grid mono">'+
      '<span>☔ '+Math.round(w.precipProb||0)+'% · '+(w.precip||0).toFixed(1)+' mm</span>'+
      '<span>💨 '+Math.round(w.wind||0)+' km/h</span>'+
      '<span>🌅 '+fmtH(w.sunrise)+'</span>'+
      '<span>🌇 '+fmtH(w.sunset)+'</span>'+
    '</div>'+
    (hrs.length ? '<div class="wx-hours mono">'+hrs.map(h => {
      const hc = wmoCategory(h.code);
      return '<div class="wx-hour"><span>'+h.h+'</span><span>'+hc.icon+'</span><span>'+Math.round(h.temp)+'°</span></div>';
    }).join('')+'</div>' : '');
}

async function openWeather(id){
  const d = dayOf(id);
  if(!d || !d.date) return;
  document.getElementById('wxTitle').textContent = fmtCalDate(d.date);
  const body = document.getElementById('wxBody');
  body.innerHTML = '<p class="hint">Carico…</p>';
  document.getElementById('wxVeil').hidden = false;
  const detail = await ensureWeatherDetail(d);
  body.innerHTML = detail ? wxDetailHTML(detail) : '<p class="empty" style="padding:0">Previsione non disponibile per questo giorno.</p>';
}
window.openWeather = openWeather;
document.getElementById('wxClose').onclick = () => { document.getElementById('wxVeil').hidden = true; };
document.getElementById('wxVeil').onclick = e => {
  if(e.target === document.getElementById('wxVeil')) document.getElementById('wxVeil').hidden = true;
};

/* Punto che sta a metà della LUNGHEZZA della traccia, non a metà dell'elenco di vertici:
   OSRM infittisce i punti nelle curve, quindi prendere il vertice centrale sposterebbe
   l'etichetta verso i tornanti. Qui accumulo la distanza e mi fermo al 50%. */
function midOfLine(line){
  if(!line || line.length < 2) return null;
  let tot = 0;
  const seg = [];
  for(let i=1;i<line.length;i++){
    const d = km({lat:line[i-1][0], lng:line[i-1][1]}, {lat:line[i][0], lng:line[i][1]});
    seg.push(d); tot += d;
  }
  let run = 0;
  for(let i=0;i<seg.length;i++){
    if(run + seg[i] >= tot/2){
      const f = seg[i] ? (tot/2 - run) / seg[i] : 0;
      const A = line[i], B = line[i+1];
      return L.latLng(A[0] + (B[0]-A[0])*f, A[1] + (B[1]-A[1])*f);
    }
    run += seg[i];
  }
  return L.latLng(line[line.length-1][0], line[line.length-1][1]);
}

function drawMap(){
  layer.clearLayers();
  state.days.forEach(d => {
    const list = stops(d.id);

    list.forEach((p,i) => layer.addLayer(marker(p, i+1, d.color)));
    alts(d.id).forEach(p => layer.addLayer(marker(p, '', d.color)));

    if(list.length > 1){
      for(let i=1;i<list.length;i++){
        const a = list[i-1], b = list[i];
        const t = legTime(a,b);
        const walk = t.mode === 'walking';
        const seg = L.polyline([[a.lat,a.lng],[b.lat,b.lng]],{
          color:d.color, weight: walk?3:3.5, opacity:.85,
          dashArray: walk ? '2 7' : null,
          lineCap: walk ? 'round' : 'butt'
        });
        layer.addLayer(seg);
        const mid = L.latLng((a.lat+b.lat)/2, (a.lng+b.lng)/2);
        const lab = L.marker(mid,{
          interactive:false,
          zIndexOffset:-200,
          icon:L.divIcon({className:'', iconSize:[0,0], html:
            '<span class="leg-lab'+(walk?' walk':'')+'" style="--c:'+d.color+'">'
            + (walk?'🚶':'🚗') + ' ' + (t.real?'':'~') + dur(t.mins) + ' · ' + fmt(t.dist)
            + '</span>'})
        });
        layer.addLayer(lab);

        /* la tratta in auto mostra sempre il percorso reale su strada, mai il
           collegamento puntinato in linea d'aria: se la rete manca resta comunque
           visibile la linea diretta come stima, senza differenza di stile */
        if(!walk) roadLine([a,b]).then(r => {
          if(!r || !layer.hasLayer(seg)) return;
          seg.setLatLngs(r.line);
          /* l'etichetta va spostata sul punto a metà della traccia reale: con una
             deviazione come Edimburgo-Glasgow-Loch Lomond il punto medio geometrico
             cade lontano dalla strada, e il numero resta appeso nel vuoto */
          if(layer.hasLayer(lab)) lab.setLatLng(midOfLine(r.line));
        });
      }
    }
  });
  state.places.filter(p=>!p.dayId || !dayOf(p.dayId)).forEach(p => layer.addLayer(marker(p,'?', '#8FA3B0')));
  scaleLabels();
}

/* le etichette si nascondono quando la mappa è troppo larga, e rimpiccioliscono con lo zoom */
/* Etichette e tempi rimpiccioliscono con lo zoom e spariscono quando la mappa è
   troppo larga, altrimenti a livello nazionale i nomi si accavallano illeggibili. */
function scaleLabels(){
  const z = map.getZoom();
  const scale = z >= 13 ? 1 : z >= 11 ? .88 : .76;
  document.documentElement.style.setProperty('--leg-scale', scale);
  document.body.classList.toggle('hide-legs', z < 8);
  /* i nomi reggono uno zoom più basso dei tempi, ma sotto il 6 diventano una macchia */
  const ls = z >= 12 ? 1 : z >= 10 ? .9 : z >= 8 ? .8 : .72;
  document.documentElement.style.setProperty('--lab-scale', ls);
  document.body.classList.toggle('hide-labs', z < 6);
}
map.on('zoomend', scaleLabels);

/* glifo nuvola+spunta, usato sia come badge sia come icona principale delle alternative */
const CLOUD_D = 'M6.5 18a4.5 4.5 0 0 1-.5-8.97A6 6 0 0 1 17.7 8.2 4.4 4.4 0 0 1 17.5 18h-11z';

function marker(p, n, color){
  const t = typeOf(p);
  const off = offRoute(p), poi = !p.alt && isPoi(p);
  /* per un'alternativa meteo il pin PORTA la nuvoletta: è quello il senso della tappa.
     Il tipo (castello, museo…) resta leggibile come piccolo glifo in basso a sinistra. */
  const mainD = p.alt ? CLOUD_D : t.d;
  /* contrassegni cumulabili: meteo a sinistra, Francesco a destra */
  const bRain = p.alt
    ? '<span class="pin-t" title="'+esc(t.label)+'"><svg viewBox="0 0 24 24"><path d="'+t.d+'"/></svg></span>'
    : (p.rain
      ? '<span class="pin-r" title="Adatta con meteo avverso">'
        + '<svg viewBox="0 0 24 24"><path d="'+CLOUD_D+'"/></svg><b>✓</b></span>'
      : '');
  const bKid = p.kid
    ? '<span class="pin-k" title="Adatta con bimbo">'
      + '<svg viewBox="0 0 24 24"><path d="'+KID_D+'"/></svg></span>'
    : '';
  const badge = bRain + bKid;
  const tag = p.alt ? '<span class="pin-a" title="Alternativa se piove">ALT</span>'
            : poi   ? ''
            : (n === '' ? '' : '<span class="pin-n">'+n+'</span>');
  const icon = L.divIcon({className:'', iconSize:[34,34], iconAnchor:[17,34], popupAnchor:[0,-32],
    html:'<div class="pin'+(off?' alt':'')+(poi?' poi':'')+(p.alt?' rainpin':'')+'" style="background:'+color+'">' +
           '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="'+mainD+'"/></svg>' +
         '</div>' + tag + badge +
         '<span class="pin-lab'+(off?' dim':'')+'">'+esc(p.name)+'</span>'});
  const m = L.marker([p.lat,p.lng],{icon, zIndexOffset: off ? -400 : 0, opacity: off ? .9 : 1});
  let h = (p.img ? '<img class="pop-img" src="'+esc(p.img)+'" alt="" onerror="this.remove()">' : '')
        + '<span class="pop-k">'+(p.alt?'Alternativa se piove · ':poi?'Segnaposto · ':'')+esc(t.label)
        + (p.city?' · in città':'') + (!p.alt&&p.rain?' · ☂ ok':'') + (p.kid?' · 👶 ok':'')+'</span>'
        + '<span class="pop-t">'+esc(p.name)+'</span>';
  if(p.notes) h += '<span class="pop-n">'+esc(p.notes)+'</span>';
  (p.links||[]).forEach(l => h += '<a class="pop-l" href="'+esc(l.url)+'" target="_blank" rel="noopener">'+esc(l.label||l.url)+' ↗</a>');
  h += '<a class="pop-b" href="#" onclick="edit(\''+p.id+'\');return false">Modifica</a>';  m.bindPopup(h);
  return m;
}

function move(p, dir){
  const sib = state.places.filter(x => x.dayId === p.dayId);
  const i = sib.indexOf(p), j = i + dir;
  if(j < 0 || j >= sib.length) return;
  const a = state.places.indexOf(sib[i]), b = state.places.indexOf(sib[j]);
  [state.places[a], state.places[b]] = [state.places[b], state.places[a]];
  save(); render();
}
