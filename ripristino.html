<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rotta — ripristino</title>
<style>
  body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:24px;
       background:radial-gradient(900px 600px at 15% -10%, rgba(147,196,164,.10), transparent 55%),linear-gradient(165deg,#1E1A14,#211C15);
       color:#F4EEE0;font-family:"Public Sans",system-ui,-apple-system,sans-serif}
  .box{max-width:460px;width:100%}
  h1{font-size:22px;margin:0 0 7px;font-weight:800;letter-spacing:-.02em}
  p{color:#8CA0AE;line-height:1.55;font-size:14.5px;margin:0 0 20px}
  button{background:linear-gradient(135deg,#F7C873,#F0AC3E);color:#20170A;border:0;border-radius:12px;
         padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:.15s}
  button:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(0,0,0,.35)}
  a{display:block;text-align:center;margin-top:15px;color:#93C4A4;font-size:14px;text-decoration:none}
  a:hover{text-decoration:underline}
  pre{background:#141F29;border:1px solid #233240;border-radius:12px;padding:13px;font-size:12px;
      white-space:pre-wrap;color:#8CA0AE;max-height:230px;overflow:auto;margin-top:17px}
</style>
</head>
<body>
<div class="box">
  <h1>Ripristino di Rotta</h1>
  <p>Rimuove i service worker registrati e svuota le cache. Serve quando l'app
     resta bloccata su una versione vecchia o ripropone l'avviso di aggiornamento.
     <strong>I tuoi dati di viaggio non vengono toccati</strong>: restano in IndexedDB.</p>
  <button id="go">Pulisci tutto</button>
  <a href="./index.html">← Torna all'app</a>
  <pre id="log">Pronto.</pre>
</div>
<script>
const log = m => { document.getElementById('log').textContent += '\n' + m; };
document.getElementById('go').onclick = async () => {
  document.getElementById('log').textContent = 'Avvio…';
  try{
    if('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      log('service worker trovati: ' + regs.length);
      for(const r of regs){ await r.unregister(); log('  rimosso: ' + (r.scope||'')); }
    }
    if(window.caches){
      const keys = await caches.keys();
      log('cache trovate: ' + keys.length);
      for(const k of keys){ await caches.delete(k); log('  svuotata: ' + k); }
    }
    log('\nFatto. I dati del viaggio sono intatti.');
    log('Torna all\'app e ricaricala.');
  }catch(e){
    log('Errore: ' + (e && e.message));
  }
};
</script>
</body>
</html>
